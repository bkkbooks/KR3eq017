body:
  text: 卷五薛鶴山痘毒藏脾經說痘之毒當由妊婦飲食中得來曾見伍氏痘科論毒藏脾經云飲食氣味屬濕濕本從脾胎孕賴脾氣生養母脾氣有濕熱襲於子之脾經猶豆種土中非時則寂然不動必待陽氣外鼓萌芽內生然後苗而秀秀而實矣且物入水則腐入木則蠢入火則焚金堅不容物惟土受物則可久又能植物又能生實也按此論最為有識其云痘毒藏脾只是太陰經氣有未純處毒字亦勿太泥即此知古人保嬰用拭口法及朱蜜等方逐下穢糞亦非不見到者命門藏毒之說從此無容印定矣痘出同時論痘本天瘡其始也無不因天時驟暖氣從外泄濕熱乃蒸而為痘譬如大人病春溫同一自內達外之象所以溫病禁汗下痘瘡亦禁汗下病痘者多則痘氣熏蒸飄泊遠近天氣通於鼻橐龠相感引動而出故證候相同而亦各隨其人之體氣為變動治法以和其陰陽為主而升發尤為吃緊蓋諸瘡屬火火鬱則發況氣從鼻入在上者尤宜引而越之若毒厲深重必直行膜原擾動三焦與素有之濕熱兩相搏激阻遏氣機則當如喻嘉言論疫之法上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒乃為調劑無誤榮衛得通痘出自順務宜先達其邪而後聽其元氣之收發拓之斂之貴在行所無事而已蓋痘雖本胎中濕熱然為毒皆不甚重惟穢惡之氣乘內氣不實而潛入者痘發乃密今種痘之法盛行而選苗不善易涉險候其明驗也故毒重者須分別三焦以逐其邪即宜照顧中氣以扶其正但云見痘治痘急於清解無惑乎輿尸而歸矣至於必先歲氣無伐天和道理極變通極精微內經至真要大論詳列司天在泉間氣主客勝復之治法最難執一非子午火燥治皆清潤丑未濕寒治皆溫補之謂也苟能於陰陽表裡虛實寒熱標本先後之間因病施治即於歲氣天和之道無不合矣痘由太陰轉屬陽明論疹屬肺而達於皮毛從太陽而泄痘屬脾而達於肌肉從陽明而透其宜於溫補者大陰虛寒也異功保元所以得效其宜於涼瀉者陽明鬱熱也承氣白虎所以致勝只因由內達外激動真氣症候似旁涉五臟非相傳也傷寒邪自表入痘瘡毒自里出毒由太陰轉屬陽明土為萬物所歸無所復傳灌漿收靨計日可愈故順者能自出者也險者欲出而不能自出者也逆者不得出者也然則痘瘡之首尾重陽明一經從可知矣胃為十二經之海氣血俱多外鄰太陽為之閤闢自能領毒出戶鼓清陽而上升務使毒火透出肌肉夫然而內火得化膿之灌漿之養何莫非陽明融化之功乎即如升麻葛根湯古人以為首尾可用深得鼓舞陽明之旨若妄執解毒之說承氣入胃劫盡真陰白虎下咽鏟盡元陽中土一餒後天本撥矣明者必計不出此題費建中救偏瑣言是書也今人家置一編而究竟解悟者亦少夫既云救偏原為爾時偏尚溫補者說法集中雖虛實並舉而虛症作賓意以人所共知者不妨從略也實症作主意以人所未悉者不嫌縷述也苟順口唸去眼光都註定實火一邊直以痘為有實無虛矣又每條詳載治驗全以大黃石膏等收功然其詳述病情處甚明無一症非身熱如火躁亂異常口膩如脂者夫身熱而日如火陽明熱盛也躁亂而曰異常三陽熱極也口燥咽乾亦少陰中急用承氣湯症也建中治法原自中款況所述痘點不日形色紫黯即日按之板實可知脈象亦必滑數實大實火有餘於茲可悟然則表症苟非壯熱之極內症苟非躁亂之極咽中苟非乾燥之極痘粒苟非紫黯板實之極脈象苟非滑數實大之極者斷不宜參用大黃石膏等藥矣建中未始非錚錚者即所著瑣言亦一片婆心惜語意太責重熱毒治驗復多誇盪滌且又雜撰覆釜鱗座及遊蠶疊錢諸名目概用寒涼攻發全不顧慮氣血和其陰陽俾灌漿周浹以偏救偏語㓨㓨不能休使無識者奉為指歸更無隅反則建中與有罪焉嘗考吳又可論治疫而及痘症專以承氣為制勝之法且云諸家論痘從未言及但知揚湯止沸不思釜底抽薪則古來小兒不死於正命者多矣此論當為建中開山之祖顧下奪之法雖不可偏廢只是全體中一隅古人如萬密齋聶久吾方書何嘗無三一承氣湯桂枝大黃湯敗毒和中飲等法只取數語該括救偏全部其餘按症列方變化生心未嘗印定後人眼目也效密齋久吾不得當不失為中醫刻鵠不成尚類鶩焉效又可建中不得必致殺人無筭矣即又可著瘟疫論時因明季辛巳壬午之疫起見而喻嘉言寓意草又言辛巳壬午時疫盛行道殣相望各處醫者發汗和中藥內惟用人參多以活人更有發斑一症最毒惟用人參入消斑藥內全活者多由此觀之南昌去蘇郡雖遠或症治自當不同然安知喻氏所謂活者入又可手而不誤藥耶著書垂後為萬世計也病變何常而師心自用據目前得效之方自詡為不易之法多見其不知量耳回瀾論痘瘡關係生死非精於內經傷寒論者不能療一有專門則局量不闊識見不廣沿流而昧其源此道遂絕即如建中濫觴釀成今日之倒懸究其變本加厲之故因見痘初起血有熱駭為毒火峻用苦寒逆折在爾時火勢勃勃欲出雖經冰伏尚相持不下不致入口即斃醫者遂信為用熟無礙於是氣機郁遏紅暈轉深倍增煩熱益共信為血熱毒重恣用寒涼以誤傳誤其弊一也遇真險症即作危言斷以不治而按日處方尤害在手口相應到得送終病家不咎其手法之辣轉贊其眼力之高醫者益嘐嘐自負無復變計斷決愈精聲名鵲起其弊二也病家樂聞清解之說婦嫗嘈嘈總以瀉食積降火毒為第一著苟不迎合其意即使收功後稍有咳嗽及痤疿尚認為未曾解毒所致歸咎前醫其或過十餘朝諸法並窮不得已加人參入清攻藥中為江心補漏徒見氣喘胸高死後心頭猶熱無識者益悔用補之誤視同鴆砒時醫深於世故務求不失人情其弊三也刻板方治通國皆然稍有異同便無聲援入附出汙顯成時局彼此互薦方同一律成固可以居功敗亦可告無罪醫道之行惟此為嚆矢矣彼惟急於道之行寧復知其術之謬況箕裘如是衣缽如是數頁方書錦囊具在眼光本不盈尺咫更無從參悟靈機其弊四也具此諸弊種種相因襁褓何知遭此巨劫謹披肝膽吐心腹而告諸為人父母者曰順痘本無不生之症而誤藥轉有致死之因險痘極有可生之路而誤藥必無不死之幸逆痘尚有求生之法而誤藥反為速死之方與其誤藥毋寧不藥年來痘疹甚行比戶哭聲順而死者猶十之三險而死者已十之七幸而獲愈者非痘出極稀即貧家無力延醫或兒性倔強滴藥不肯沾唇否則藥雖下咽立即嘔出如有神助求其因藥而愈者百不獲一也曾有一幼醫之女痘殤哭甚哀余笑謂之曰君當取左傳語自為懺悔因朗誦余殺人子多矣能無及此乎嗟嗟余豈好為垢病哉亦思稍挽狂瀾為嬰兒開一線生路耳苟能明不服藥為中醫之訓則全活已過半矣況由內經傷寒論而精之者哉葵菜預解痘毒說預解痘毒萬氏有代天宣化丸但可預防天行究於內毒無涉若餌硃砂珍珠黃連犀角兔血鶴卵之屬總因視為欲火之毒故專入少陰方雖新奇試多無效或塗萆麻膏浴鱧魚湯欲提毒出外亦取未捨本余究心格致獨主毒襲脾經之說又得松槃山人筆記詳言葵菜解毒之驗按葵性涼滑入脾清濕熱有功喜其言之信而有徵也今附載於後葵一名甜菜一名女菜一名滑菜一名莙薘蓋百菜之主也四時可種為蔬秋種者更佳故冬葵子尤為藥品所尚嘗閱本草綱目李氏開載葵菜之功萬不失一而歷代流傳疑信相半遂從菜部改入草部且因葵性寒滑恐傷脾胃不敢輕試遂令對病妙藥棄置不用而惡毒流染坐致痿頓心甚傷之久有此疑無從辨識十數年間廣詢博訪乃知為甜菜無疑間令童稚餌之雖無傷害而功效未顯未敢輕傳比年以來數經此症盛行見不治者十有八九而嘗食此菜者百無一失乃知相傳之訛致神功之久湮也可勝慨哉方敢形之諸著以廣其傳嗟乎因慎重而坐令陸沉因未廣而猶然胥溺失今不傳後悔奚及乃開列其方以公諸天下後世蓋其寒滑者性也泄利者毒也與脾胃根本何與且未病而先藥病受之病去本完最為上策即見點而後食猶將收大半之功不猶愈於坐火觀薪者乎又豈若俗醫見危迫輒進芩連慘均剚刃者乎噫是在信不信試不試之間耳安敢以人命為等閒而冀其必售乎其法採此菜熟之以供蔬食愈久愈佳余所為懇懇欵欵祈人之必信必傳者聊以逭逋慢之愆而為不可復生者志痛耳余何慕焉擬張令韶傷寒直解辨證歌辨表分寒熱晝夜頭疼渾不了先提清表分身熱脈浮邪在表病症看來似一般表寒表熱須分曉點出眉目或有汗或無汗汗少汗多且莫管只就脈浮中分出兩條線是最當著眼處表寒浮緊或兼弦表熱浮數兮或兼滑長與弦緩寒者身疼慣怕寒以下旁證之頻求衣被遮溫暖熱者雖然也畏風無風便欲開帷幔寒不渴兮熱或渴寒舌白苔熱黃澤寒者口和熱口苦寒減食兮熱能食表寒散以辛溫味收束表熱辛涼非一例表寒切勿先消食惟恐引邪入里去表熱切忌是辛溫變成燥熱為難治辨表分虛寒虛熱頭痛脈浮表也或兼大兼弦或兼數兼弦按無力虛也表分虛同寒熱別表若虛寒必惡寒屢進辛溫汗難出若用辛涼必致汗多而近於亡陽矣氣擾翻教身體麻此下言辛溫之後變象或大熱兮或微熱胸前微滿且欲嘔口淡或渴或不渴表如虛熱口亦淡必兼微渴思潤澤服過辛涼身反痛舌形定現微苔色此下是服辛涼後變象不論大汗與無汗但查熱勢加猖獗兩症皆須補益來寒加薑桂宜用桂枝湯加耆術甚則加人參干炮姜之類如血虛無汗可加當歸紅花和其陰血熱芩柴宜柴芩歸芍耆術之類甚則加人參辨裡寒裡寒脈沉緊或兼緩與遲惡寒骨節痛五字是表證表症似而非胸腹滿痛且欲嘔或吐或利俱有諸或熱或不熱手足指冷厥喉有冷涎苔白滑或如豬腰或茶褐此宜桂枝湯去芍加乾薑裡寒溫補是良方甚則加桂附可以復其陽辨裡熱裡熱脈沉數主腦或緩滑以長無論其神昏與清無論其身熱與涼唇焦齒黑讝語現舌短苔黑或起芒裂破出血反不渴或渴飲冷小溲長或利清水或便鞭聲音洪厲力氣強狂發登高棄衣走否且循衣而摸床面目或赤或不赤其色垢濁如薰黃即不赤亦面垢此宜芩連石膏類甚則芒硝與大黃辨裡虛寒里若虛寒者脈必沉而緩主腦微細按無神救之惟愁晚手足常四逆面色青黑黯渴而不欲飲但覺口中淡惟喜極熱湯稍解胸中滿或嘔或吐或下利或不大便心下悸心煩喜躁不思食蜷臥恍惚每獨語舌帶淡黑色或如豬腰或糙米或白苔而潤或無苔而燥短縮不能伸望之萎且槁理中四逆急溫之否則神昏汗脫了辨裡虛熱欲知裡虛熱脈沉而數按無力主腦身熱退不淨口渴神恍惚與湯則飲之不與亦不討有時思食來食到便先飽舌上略覺燥得湯燥即好或有微苔或無苔或淡紅色如桃腮此為里分少津液瀉心導赤佐生脈辨假虛寒脈沉細兮或緩長出則遲兮入則疾主腦或伏筋骨按有力口中不渴舌燥短不但身涼且四逆神昏譫語口目動狀若驚風作痙厥或利清水或不便解下或如爛桃色人事不知歌且哭身輕偏自能起立大證據或吐蛔蟲口苦辣小便行時長且赤此是虛寒假症現應須解毒和涼膈辨假實熱脈弦而大或洪數無奈按之全不見主腦任他熱勢如燎原真底實板已先現苔白或黑短不燥或如豬腰或米糙面目俱赤為戴陽譫語發狂手足躁或有汗兮或無汗坐臥只求井中蹈舌腫唇焦齒出血渴飲湯水常不絕內是真寒外假熱理中八味合生脈煎成冷飲代茶湯庶幾虛火歸源得誤用芩連增躁渴變成死症庸師到此休饒舌辨渴渴症須分寒與熱熱者脈數而口苦主腦身熱汗出喜冷飲或兼湯水百杯可大證據此宜花粉與川連加味參同伴白虎虛寒而渴者脈必細兼遲即教洪且大終是數而虛主腦渴喜極熱湯稍溫便嫌冷有時思得水仍復不能飲大證據此宜生脈中薑附辛以潤又有汗下之後亡津液著眼生津之品始為得不宜涼藥不宜溫何況諸多辛與熱辨舌胃氣現於舌上有淡白苔俗醫漫消食必致光無胎調理到思食苔白漸生來君不見病有厚苔滿舌者忽然退去光而燥乃為胃氣絕之徵從此參詳便分曉又有大紅舌色無苔者君火之色浮於外盛極將衰欲化灰無病之人亦常有之宜用附子引火歸源才得退舌色純紅必腎氣素虛之人無他症而忽現此舌者用附子引火歸源固合又若敖氏傷寒金鏡錄載純紅為將瘟舌乃熱畜於內而病將發也不問何經宜用透頂清神散搐鼻法亦不可不知又有舌黑如淡墨更不須分燥與濕總歸腎水克心火陰盛陽衰須早識除非黑起芒刺燥而裂陽邪熱結何消說辨虛寒舌燥舌燥有多般或淡黃或淡白或起微刺或灰色更有望之如燥們之澤其色或紫而或黑必兼吐利而厥逆神昏譫語詞謇澀舌燥而語言不清因燥而下清可治舌潤而語言不清所謂口雖欲言舌不得前死症也脈形微細定如絲虛寒定案或雖洪大終無力急用生脈以養津附薑苓草和耆術俗醫謂五味味厚多則用十餘粒少則七八粒此不通之論必須錢余方效辨實熱舌燥實熱舌燥先有地或黃或黑起芒刺即使苔輕偏破裂必兼身熱焦唇齒渴喜飲冷麵目赤並無吐利與厥逆讝語便閉諸症現洪數滑長脈可驗白虎承氣隨變換辨寒頭痛寒頭痛脈浮而緊主腦或弦或沉更兼遲惡風與寒四肢冷大證據頭喜熱物包裹之更有劉河間論頭痛屬熱者亦惡寒喜熱緣熱為寒閉則其痛甚熱氣流通則痛止也然止後必復作而益甚為驗脈亦必有異理中參入桂天麻附子細辛重者加少佐羌防法亦精辨熱頭痛熱頭痛脈浮而數或滑而長亦有諸口苦舌乾渴欲飲痛連風府與風池大證據惡熱其常惡風暫此為風熱症已顯羌防柴葛連翹芩甚則石膏用之驗辨虛頭痛虛頭痛脈弦而大弦則為寒大則虛主腦痛極不堪喜得按日夜呼叫語聲嘶大證據其痛或專在額上遍頭皆痛亦有之急宜參苓耆術加附子此症失治危即死辨風寒骨痛風寒骨痛脈弦緊主腦或遲而緩亦有準身熱惡寒手足冷大證據舌上白苔口不渴拘攣遍體酸難忍甚則上嘔下利並桂枝湯內用天麻有濕去芍加附穩辨虛骨痛脈弦而大數無力主腦或發熱兮或不熱惡風兮拘急口淡兮神思恍惚大證據痛在骨節兮服發散藥而痛愈劇此神氣傷也合用桂枝與耆術大凡人身諸骨節其數三百有六十是神氣之所遊行而出入君不見仲景新加湯重用參姜以復脈辨虛寒腹滿藏寒生滿病出內經脈遲緩兮或沉緊或虛大兮按無力主腦腹滿時減減又甚證據出金匱不欲食兮食即嘔或泄瀉惡寒兮而渴喜熱飲薑桂香砂溫散之不應再加參朮耆辨實熱腹滿脈沉而實兮主腦或滑與長兼腹滿不減兮證據減亦不足言二句出金匱大便雖解而不暢兮或得解而少寬腹滿硬痛不可按兮無吐暈等虛症之相參此宜枳樸以消之甚則加大黃參其間辨虛寒不大便大便不通群呼熱不知寒凝亦斂結腹不滿兮口不渴疑案白滑胎兮弦緊脈定案此屬虛寒無浪攻照常飲食且從容切不可餓遲之一二十日後溫補足時氣自通辨實熱不大便脈數有力長滑甚主腦煩渴腹滿按之硬證據或潮熱兮食即脹時有濁氣從後進此為胃熱宜下之一有虛症須細審大約實症一下即愈一有虛症便須細審即必當下者亦只用涼膈以微利之解毒以和之陶氏黃龍湯以補而下之辨小便不通小便不通分虛實虛則三焦失其職屢經利水不相合此宜金匱腎氣丸治其三焦決瀆官象牙生煎服亦安實者人素強或好食熱物肺熱不能通水道以致膀胱成熱結宜用豬苓澤瀉梔滑石用後仍不效須向膀胱尋外竅經說毫毛是其應經曰三焦膀胱者腠理毫毛其應是三焦主腠理膀胱主毫毛膀胱有出竅而無入竅濟泌別汁而滲入於膀胱者也毫毛是其外竅譬如水注塞其上竅則永不能出矣如人不虛利小水而仍不通者宜發其汗外竅通而內竅亦通此所謂開鬼門也改從發汗最為妙又有動其胞中血虛寒實熱隨症別虛寒便溫補熱則清熱而養血因症施方不可執辨嘔其人受暴寒審因或食生冷物吐酸並乾嘔證據平胃正氣合脈滑胃有餘主腦飲冷不喜熱服溫熱藥嘔愈甚證據黃連竹茹佐薑汁兼虛參以參加入脈或虛大數無力主腦嘔吐清涎及冷沫證據胃虛不能容穀食聞食即嘔食反出人參理中最為良丁香附子加亦得脈滑有力症不虛胸滿按之痛愈劇證據合用樸實與二陳此謂中焦之嘔從乎積東垣語辨吐蛔熱厥吐蛔蛔必多神情清楚脈形和隨生隨吐無煩躁瀉其濕熱勿蹉跎厥陰傷寒屬風木吐蟲兼吐水清綠手足厥冷煩躁甚烏梅丸義君須讀辨汗虛汗須分陰與陽陽虛自汗補其衛其人素虛或勞傷或大病後腠理虛陽不能衛外而為固則自汗宜用參耆五味芩術甚則加桂附如乾薑半夏陳皮開達之藥皆不可用盜汗歸之陰氣虛參歸甘地從其類人臥則血歸於肝陰虛而不能為守則盜汗宜參芩耆朮五味歸芍生熟地之類惟有陽明邪並來熱氣薰蒸毛竅開汗出溱溱常不止但宜涼解得和諧汗有心家血液之汗太陽津液之汗俱不可出惟陽明水穀之汗雖出無害故陽症傷寒熱氣熏蒸毛竅開發溱溱而自出亦猶滾湯貯於器中熱氣上蒸而外濕也若汗不出熱氣不得泄必鬱而發黃即宜用清涼以解其熱而汗自止不必用止汗之藥更有傷寒病久無汗出大劑參耆柴桂合頓然出汗退其熱景岳書中亦曾說辨譫妄讝語是多言皆因胃汁干就中讝語有實象讝字從嚴侃侃然旋轉風輪難自主才呼李四便張三鄭聲氣短神蕭索鄭重頻煩不厭復一樣逢人講話多不曾說南又道北設使讝與鄭大半屬無稽是則名為妄虛實皆有之若夫似睡非睡間隱隱躍躍如交談此為獨語未全亂各從脈症細詳參辨面目赤面目赤有三須從脈症參陽氣鬱於表辛涼可散焉裡熱薰於上白虎及黃連無根火外浮此是內真寒八味生脈煎冷飲假對假兮古所傳辨下利下清穀者為虛寒下清水者為實熱惟有膿血稀溏和汁沫此三件中細詳別假如作嘔不食兮腹痛喜按心恍惚而煩兮或動悸與頭眩燥而不欲飲兮頭眩耳鳴而口淡後重逼迫兮既解而仍不減脈弦數而虛大兮皆虛寒之外現苟脈症之反是兮即實熱之證驗辨厥手足冷時為四逆厥者其冷過肘膝仲景傷寒俱禁汗無論陽厥與陰厥陽厥是傳經病自三陽併入陰熱極必兼勝化行還有始熱終寒因藥誤也能轉入陰寒路執定傳經亦是錯陰厥是直中喻氏中寒論當誦寒邪斬關直入來急救真陽休夢夢還怕熱邪深入血頓然厥冷身無熱君不見吞痧樣子忌熱湯不比中寒一例說總之脈症要詳參莖草拈來生殺間陽厥譫渴陰吐涎陽者身輕陰者蜷復看其人唇爪甲青紫為熱青黑寒又有痰厥食厥和屍厥病久陰陽二氣虛亦厥各等各樣在準繩步步須求脈症合辨腹痛腹痛是虛喜揉按虛者必寒病涉陰脈遲緩兮或虛大諸多虛象察其因理中桂附可施行熱者面黃澤加以長滑脈宜用黃連苦清熱少佐薑萸亦相得更有欲嘔不嘔腹痛多寒熱其如錯雜何黃連湯內乾薑桂好共參甘兩下和食痛應消食難在虛寒兼食積學士溫脾法可宗許學士有溫脾湯見本事方化為煎法尤熨貼有虛寒之人患腹痛服溫補藥而相安時止時作痛仍不解甚則利清水或白沫此虛中有買或先有宿食在腸不曾去或病中腸胃虛不能運化所食之物停於腸中即一二塊宿糞亦能作楚宜用溫補藥煎好去渣入大黃一錢不甚虛者可加一錢五分滾四五沸服之宿食自下正氣不傷而病隨愈此屢試屢驗之妙法也蟲痛面黃吐涎沫食酸即安甜即劇虛實寒熱要分曉殺蟲方中求配合氣痛因郁惱必連胃脘與兩脅病久人必虛滋補兼疏郁痛不可近者按之濡軟為畜血不比硬滿為熱結重則桃仁承氣湯輕者宣通微下奪別有吞痧一症現濕熱薰蒸邪變幻急刺委中出血良磨服玉樞丹亦善最怕是三陰寒症認為痧不飲溫湯飲冷茶亂進丹丸並放刮臨危空自悔前差辨脈脫六脈俱脫者大命垂危矣神昏脈脫者死神清脈脫者亦死通脈四逆急服之還怕脈因暴出死但得脈來微續生更需附子四五枚人參小半斤周時服盡休間斷隨進米粥始回春參力偶不繼前功必盡棄平時無學力到此滋疑懼每見虛寒之極服溫補躁亂不寧嘔且吐此為藥力尚未全切莫心疑換別路大約三陰病症露危劇急則六日或三日緩則行期十二日幸而君火未全衰反見舌乾等症出更須薑附助其陽漸得陽回舌生液若見舌乾投涼劑壞乃百年人壽事起手果然認得真斷不朝三與暮四君不見景岳全書用法精十補一清巧相濟又不見嘉言寓意重叮嚀陰症轉陽必自愈濟困扶顛道在斯一有遊移便錯去更有虛寒服藥來溫補不安涼適意兩寒相得從其類正氣敗壞決不治至於實熱失汗下脈伏似脫君休怕大承十棗用即安神氣分明現真假須知實熱治可緩涼瀉一投撥便轉不比虛寒救濟難仁術全憑思與辨
