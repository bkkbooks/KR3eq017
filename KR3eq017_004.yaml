body:
  text: 卷四沈受益人身一小天地亦有南北兩極論按周天三百六十五度四分度之一其間日月星辰之周流循環而不息者有南北兩極以為樞紐二極居其所而衆星共之星動而極不動動主於靜也靈樞五十營篇曰人經脈上下左右前後二十八脈以應二十八宿一呼氣行三寸一吸氣行三寸一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脈終矣夫人之營衛運行無極以統之焉得常周不休心主與命門即人身之南極北極也心者神之舍也神藏不露而無為五藏六府之運行莫不以心為君主故經言主明則下安主不明則十二官危心之元神即天之南極也命門一點為生氣之原藏於兩腎中間以為十二經脈之根本必須鎖鑰閉固即經所云陰平陽祕精氣乃治腎之元氣即天之北極也天之南極入地三十六度而位乎南下為陰而南為陽居陰位之陽也人之心君位乎腹之上腹為陰而上為陽亦居陰位之陽天之北極出地三十六度而位乎北上為陽而北為陰居陽位之陰也人之命門位乎背之下背為陽而下為陰亦居陽位之陰天之二極對待以為中樞而後運行不息人之心君與命門亦必神氣相合而後營衛得以周流不息顧靜者動之根也心為十二官之君主而主乎靜定命門為十二經脈之根本而主乎祕密是即兩極之居其所而不動也命門脈診辨張景嶽三焦胞絡命門辨云命門為陽氣之根故隨三焦相火之脈同見於右尺按命門居兩腎中間即人身之太極乃陰陽之根底既為陽氣之根亦為陰氣之根景嶽真陰論云命門之火謂之元氣命門之水謂之元精論理並無偏倚及至論及脈位則但將右尺以候陽氣之根將謂左尺不可以候陰氣之根乎將謂陰氣之根亦於右尺診之乎將謂命門但候元氣不必候其元精乎此景嶽之偏於溫補其誤即在於此所謂差之毫釐者也按命門原氣稟於有生之初得父母之兩神相合而化形如露珠之一滴升于丹鼎之上以為生身立命之根天地陰陽五行之精亦即妙合於是五臟六腑四肢百骸由此而生不可以言水火並不可以言精氣乃精氣神三家會合而始成此一點莫可名言而曰命門指人身有生之根天之所命而名之左氏曰民受天地之中以生所謂命也此之謂歟命門一點藏於兩腎中間以運行陰陽之氣全借腎中陽氣陰精以為之養在有生以前則精氣生長於命門在有生以後則精氣之生於命門者命門反須精氣以養焉精氣不足猶可峻補以救之至精氣大傷而命門生氣之原絶則非補精氣之所能挽回故言至水火精氣已屬腎陰腎陽而非命門矣夫命門為生氣之原非特右尺不能候即兩尺亦不能候且六部俱不能候是當以難經為斷也八難曰諸十二經脈者皆繫於生氣之原所謂生氣之原者謂十二經之根本也謂腎間動氣也此五藏六腑之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絶則莖葉枯矣寸口脈平而死者生氣獨絶於內也獨是一難獨取寸口以決死生而八難言寸口脈平亦死是何其自相悖謬乎蓋寸口為脈之大會可決死生乃穀氣之變見後天有形之可脈也生氣之原絶則寸口脈平猶死乃元神之聚散先天無形之不可脈也然則命門之絶將不可脈之而已乎經曰望而知之謂之神在醫者之以神照神乃神聖之能事誠非下士之所能窺測而以右尺為診則固知其非也沈悅庭治肝補脾論金匱論治肝補脾肝虛則用此法此指肝之陽虛而言非指肝之陰虛火旺而言也肝陽虛而不能上升則胃乏生髮之氣脾無健運之力而水無土製腎水之陰寒得以上制心陽周身陰盛陽衰而純乎降令則肺陰之金氣盛行肝陽之生氣愈病矣必得補土之陽以制腎水之陰寒則心陽無水以克而火盛火盛則肺金陰氣不行不至陰肅降令從右行左以傷發生之氣則肝木之陽氣自必暢茂條達矣古方用逍遙散治木鬱土中以宣陽氣是肝木陽虛而用治肝補脾之法者也乃後人用以治陰虛火旺之肝病則以升令之太過者而復升之宜其有升無降而至厥逆矣蓋一陰一陽可不明辨哉其治陰虛火旺之肝病如血虛宜滋水虛則補其母也火旺則苦泄實則瀉其子也氣升上逆則降氣以金制木也其與治肝補脾之法正相反豈可混治耶沈實夫四維相代陽氣乃竭解按王太僕注四維為血肉筋骨吳鶴版皋注四維為血脈筋骨以是四者維持一身以注維字之義馬元臺以血脈筋骨於四字未妥因注四維為四肢汪訒菴以王注之血肉筋骨馬注之四肢俱於代字無著因注四維為四時諸說紛紜不一顧四肢腫而愈者甚多未可便云陽氣乃竭至血脈筋骨及四時之說又腫病中從未論及竊思四維之見素問者屢矣氣交變大論曰土不及四維有埃云潤澤之化則春有鳴條鼓拆之政五常政大論曰其眚四維故王注以四維為東南西南東北西北之位也及後世馬元臺吳鶴皋等注此二篇之四維亦俱宗王注四隅方位而說是四維當作四隅解一定而不移矣四維相代當作人身之四隅解亦無疑矣蓋言腫之起於前後左右者自此至彼一身盡腫陽氣乃壞極而無存矣四隅盡腫者即臍突背平缺盆平足心平之類是也丹溪以此二句為衍文此求其說而不得從而為之辭亦不知為不知之義也但無此二句則語氣未全且於義理亦未周足至汪訒菴以陽氣乃竭之竭字作壞字未知本於何人竭之與壞其義不甚遠姑置不論膀胱者州都之官津液藏焉氣化則能出矣解王太僕注曰得氣海之氣施化則溲便注泄氣海之氣不及則閟隱不通故曰氣化則能出矣王太僕為注釋之開山宋元明歷代諸家各仍其說莫不以津液即為溲便殊不思氣化則能出者言膀胱之津液得太陽之氣而後能出於皮毛非津液下出之謂也且津自津液自液小便自小便逐字考之內經各有明文靈樞決氣篇曰腠理發泄汗出溱溱是謂津谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液又曰津脫者腠理開汗大泄液脫者骨屬屈伸不利又五癃津液別篇曰三焦出氣以溫肌肉充皮膚為其津其流而不行者為液是經文津液二字各有著實注解者不得以津液小便混而莫辨矣自古以來接內經之統以繼往開來者其惟仲景先師傷寒論乎其治太陽病無汗用麻黃湯有汗用桂枝湯此津藏於膀胱氣化則能出之一證也金匱用栝蔞桂枝湯以治柔痓葛根湯以治剛痓因邪傷太陽液不養筋故助太陽之氣化以運行於皮毛以流通津液則筋脈得以濡潤此液藏於膀胱氣化則能出之又一證也以經注經己甚明矣而仲景治法又與經旨符合則津液之非小便尚何疑哉又水飲入於胃上升於肺以下布於三焦者謂之水水濕壅而不通則小便不利輕為腹膨重為腫脹此水在三焦而未入膀胱者也其既入膀胱以後水之上升而汗出溱溱者謂之津所謂下輸膀胱水精四布也貯於膀胱而下出者則謂之溺溺孔閉澀則為癃祕內經之胞痹等症是也素問宣明五氣篇曰膀胱不利為癃不約為遺溺靈樞本輸篇曰實則閉癃虛則遺溺經脈篇曰肝所生病者遺溺閉癃又曰足少陰之別實則閉癃竊意三焦不能化入膀胱者其病多虛故歷來治水腫水脹者總以氣不化水為主也因溺竅不通膀胱之內水脹者其病多實故統觀內經諸篇癃閉則皆有實而無虛也又按津之外出者為汗津之內出者為溺故汗多不得利小便恐陰從下脫也失小便者亦不得發汗慮其陽從上脫也小便之與汗俱為津之所化是同出而異名者也液為水穀之精華即津之流而不行隨氣以運於周身則潤皮膚澤筋骨補腦髓聚於膀胱布於經絡宜藏而不宜出故十二官之神明等俱言出而此獨曰藏者言津之液藏也氣化則能出者但可指津而言也若液從溺竅而出則為膏淋等症矣尚得謂之氣化哉膀胱上口論膀胱上口靈素未言有無後世聚訟紛紜或言有上口而無下口者乃以氣化則能出之句而誤會也若無下口焉得氣一化則遂若此通利哉是無下口之說不必論矣或言有下口而無上口者張景嶽李士材俱主是說因景嶽士材之書近世風行海內故人皆以為無上口矣第無上口則交腸之易位而出者糞從何處入於膀胱乎張三錫以為上下俱有口者是矣但語焉而未詳也夫水道既從小腸下口以入膀胱則清濁不分者何獨並於大腸之水瀉人所常有而糞入膀胱之交腸患者甚少乎諦思其故必系膀胱有上口而常閉乃為平人之常水之入於膀胱者仍是三焦化入而非從上口以入者也或腑氣大虛則力乏而竅不能閉或邪熱傷腑則熱主開泄而竅亦不能閉以致糞從小腸下口入於膀胱上口並隨小便而出矣譬如人身之外竅亦有常閉而不通者臍孔與兩耳兩乳無故則常閉而不開有故則或出膿血或通乳汁膀胱之上口亦可以類推矣世人皆以為無上口者一則宗景嶽士材之書一則見獸脬之止有下口也不思天地之生物各有不同者如毛蟲則五臟俱全羽蟲則無肺而無前陰即人身亦有不同者男子肋骨二十有四女子肋骨二十有八男子頭骨八塊女子頭骨六塊人與人尚有異焉人與獸豈無異乎五芩散解此治小便不利之主方乃治三焦水道而非太陽藥也素問經脈別論曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行此方用桂以助命門之火是釜底加薪而後胃中之精氣上騰再用白朮健脾以轉輸於肺而後用二苓澤瀉運水道之升已而降其先升後降之法與內經之旨滴滴歸源復與太陽何涉傷寒論治小便不利汗出而渴者五苓散主之不渴者茯苓甘草湯主之蓋渴為陽氣不足水不上升也不升則不降故用肉桂以升之二苓澤瀉以降之而用白朮一味以為中樞乃注者莫不以渴為熱入膀胱津液被劫所致如果熱入而復用桂術以溫液耗津又二苓澤瀉以滲之是熱之又熱耗之又耗速之斃矣且不渴者反不用五苓而用茯苓甘草湯可知不渴則無需桂術之蒸騰津液而桂術之非治太陽而治三焦更不待言矣有小便不通而以桂枝易桂者此必命門之火未衰而外有太陽表症因邪傷太陽傳入三焦故表邪未解而三焦之水道不利即傷寒論所謂中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之是也表症為太陽不足故用桂枝以宣陽氣通津液於周身即經文水精四布五經並行之旨非用之以通水道下出也里症為三焦之氣化不宣故用二苓之瀉以通三焦之閉塞非開膀胱之溺竅也夫下焦之氣化不宣則腹膨而小便不利水蓄膀胱此乃水蓄於膀胱之外不能化入膀胱故用五苓以化之亦有用桂枝而效者因衛出下焦助太陽氣化以運之非為太陽腑內之水蓄也如三焦既將水氣運化入於膀胱而不出此真太陽府內痹而不宣即胞痹症也素問痹論曰胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕水在膀胱之內是膀胱脹滿而非腹脹故按之內痛若沃以湯其溺孔之道痹而不通故澀於小便膀胱痹氣隨太陽經脈之行以從巔入腦故上為清涕此真太陽本府水結膀胱之內而非腹中膨脹之小便不利也總之水入膀胱之內方屬太陽若水在膀胱之外腹膨滿而小水不利者此臟腑之外軀殼之內三焦主之虞大民曰三焦者指腔子而言也故治腹滿腫脹之症設使一味利水則三焦之氣更不能施化而膀胱津液為之下竭非仲景五苓之意也沈思劬辨素問濁氣歸心之訛讀素問至食氣入胃濁氣歸心淫精幹脈節此濁氣歸心不得其解因思心者君主之官神明出焉如果濁氣歸心焉得虛靈不昧具衆理而應萬事乎按此心字必因千百年相傳之書脾字誤為心字考靈樞陰陽清濁篇曰受谷者濁受氣者清又曰營者水穀之精氣也和調於五臟灑陳於六腑又曰陰清而陽濁又曰諸陰皆清足太陰獨受其濁夫腑為陽臟為陰既曰諸陰皆清則心之受清可知既曰足太陰獨受其濁則濁氣歸脾之外更無一臟再受其濁可知是濁氣歸脾經文無不印合竊以為一字之訛敢以質諸高明周蘊石祖氣論夫絪縕鼓蕩於大地之間者孰推行是孰發育是無非一氣為之橐籥而已天以五行化生萬物人以五臟應之天一水也故兩腎為先天之本天五土也故脾胃為後天所資此東垣丹溪之論後人皆起而宗之至汪氏苓友獨主一心其言曰萬病皆起於心五臟六腑皆繫於心天有日則晝夜分四時序萬物生世有君則尊卑定貴賤明兆姓治心者君主之官也在天以日為主在人以心為主論凡數萬言直與前賢鼎立其嘉惠來茲豈淺鮮哉特是三家之說一指脾一指腎一指心則猶是以有形之臟體言也夫氣者形之本也人自賦形以後陽曰氣陰曰血而先天無形之氣則宰乎陰陽血氣之先修養家謂之祖氣即天地生生之氣也緯書之言曰有生皆在氣中凡夫負陰抱陽昆蟲草木之屬莫不感此氣而生故氣在則形存氣去則形壞孔子曰㹠子食於其死母者少焉眴若皆棄之而走所愛其母者非愛其形也愛使其形者也使其形者何也氣也生氣通天論曰蒼天之氣清淨則志意治順之則陽氣固又曰服天氣而通神明靈素之言汪洋浩瀚其要旨止歸一氣字夫涕唾津精汗血液七般靈物皆屬陰陰者死質也氣者生陽也方書中往往以血肉有情為煉石補天之具不知吾身中生陽之氣既若存而若亡則此塊然者亦漸鄰於朽腐之鄉乃反恃此物之朽腐者以卻病延年不其難乎是故治形必先治氣形特氣之宮城治氣必先治心心實氣之主宰先天之植此形者惟氣後天之帥此氣者惟心斗柄招太陽徑寸混三才三奇論之祖氣即子輿氏之言養氣求放心也古人云行醫不識氣治病從何據蓋無此沖和不息之氣則心何由而藏神脾何由而載物腎何由而為蟄藏之本經曰知其要者一言而終其斯之謂歟連珠連珠之作肇自漢章之世義取貫珠文多假喻節短而韻長言近而旨遠蓋詞賦之流派也前賢葛稚川論醫用連珠文今仿其體蓋聞天動星回而辰極居其所璣旋輪轉而衡軸執其中是以位定坎離握樞紐於南北緯纏卯酉分升降於西東蓋聞水障於土還以潰其土火生於木仍自焚其木是以植千章之嘉樹必溉清渠築百丈之修堤先疏支瀆蓋聞漏滴銅壺水滑必迅灰傳葭管氣至斯飛是以虧天一之真脈行必速於常度定甲乙之候節令每決於先幾蓋聞熱獸炭之盈爐暖勝三春而不能代燭龍之照焚蘭缸之寸燼光逾四壁而不能代暘谷之暄是以鏡本非臺君以名而離精獨炳薪傳有火相以位而泉水常溫名字借用王氏注蓋聞陽為陰逼不走即飛陰遇陽消非枯則槁是以蟄雷之性激以暴雨而勃升旱魃之災沛乎甘霖而卻掃蓋聞蝨處頭而黑麝食柏而香頸依嶮而癭齒居晉而黃是以漸染深而變質方宜之異服用久而增氣物化之常蓋聞鰲山之燈名走馬旋轉於點火之光西洋之鐘號自鳴循環於周天之度是以桃梗土偶形本氣而運行肝醜肺寅經隨時而流注蓋聞機引桔槔不敵尾閭之泄戕從萌蘖何假甘露之滋是以參同契之金華難填欲海悟真篇之首經詎起枯枝蓋聞樹合歡於繡閣不怡思婦之顏栽萱草於蘭庭無解愁城之織是以七情相倚針石何施五欲交攻刀圭莫塞蓋聞朔雪嚴風不解燎原之熱流金爍石難回冰室之涼是以五方之裡攸分性殊寒燠六氣之中異所臟別陰陽
