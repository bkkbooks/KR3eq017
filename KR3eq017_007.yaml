body:
  text: 卷七王鳴岡辨脾胃升降余嘗考治脾胃莫詳於東垣求東垣治脾胃之法莫精於升降夫升降之法易知而升降之理難明其在經曰脾胃為倉廩之官五味出焉蓋脾主生化其用在於無形其屬土地氣主上騰然後能載物故健行而不息是脾之宜升也明矣胃者水穀之海容受糟粕其主納納則貴下行譬如水之性莫不就下是胃之宜降也又明矣故又曰清氣在下則生飧泄濁氣在上則生䐜脹夫清氣何蓋指脾氣而言不然何以在下則飧泄也其濁氣何蓋指胃氣而言不然何以在上則䐜脹也是非可為脾升胃降之一確證乎由此而推如仲聖所立青龍越脾等方即謂之升脾之清氣也可其所立三承氣諸方即謂之降胃之濁氣也無不可觸類引伸理原一貫先聖後聖其揆一也考東垣所著補中益氣調中益氣升陽益胃各方其論雖詳於治脾略於治胃而其意則一臟一腑升降各有主治顯然不可混者其與先聖之理又何嘗相悖而後先輝映足以發明千古良可師也苟其顛倒錯施俾升降失宜則脾胃傷脾胃傷則出納之機失其常度而後天之生氣己息鮮不夭扎生民者已余偶讀東垣書詳究脾胃以辨其升降之理如此管象黃氣有餘便是火解昔賢有云氣有餘便是火此當專以病氣立論若元氣有不足而無有餘者也何則氣化於精精生於水穀故人情一日不再食則飢飢則氣怯而倦怠若飲食適宜起居有節始得元氣充流一晝一夜正合一萬三千五百息為人身之常度故聖人御氣如持至寶非以氣之易於不足乎自夫風寒暑濕燥火六淫之氣外侵營衛經府阻塞正氣流行出入之道遂致腠理閉塞胸腹痞滿二便不通種種顯病氣有餘之象而元氣已形內餒之機醫者但當察其所因如風則用和寒則用汗之類即不致化火而元氣復矣若治不中要病氣留著則六者皆可化火即熱病為傷寒之類而病機十九條屬熱者多是也故曰氣有餘便是火即七情之病亦莫不然如喜太過則喜氣有餘而心火熾怒太過則怒氣有餘而肝火炎此尤當從臟氣之陰陽虛實而調劑之若執是說以往不曰破氣降氣即曰清火瀉火吾恐少火生氣一傷則俱傷一敗而難復非衛生之道也豈古人立言之旨哉東垣景嶽論相火辨東垣曰相火者元氣之賊也丹溪述之景嶽非之論曰情欲之火邪念也邪念之火為邪氣非相火之所為也二家之說俱有詞障夫相火者腎中之真陽稟自先天為人生之根本云為動作賴之以立衰則病息則死老子曰一生二周子曰無極而太極太極動靜而生陰陽是相火一人身之太極也太極不能無動然動而有節即是少火以生氣動而無制則為壯火以害氣如水能浮舟亦能覆舟實一相火之所為豈得另有邪火也故人之喜怒愛懼不過五藏之本志男女大欲則又萬物之化醇是皆天地間經常之理原不至於傷生惟狂蕩無節斯為害耳然相火既定位於下焦蒸騰發育夫能使之理勝而安欲勝而危者則惟一心故心為君火經曰君火以明相火以位又曰主不明則十二官危此其尤大彰明較著者也大學正心釋氏降伏其心養生者善治其心則推而極之為聖賢為仙佛守而持之康寧壽考若舍君而言相無怪乎或為元氣之賊或為生氣之本意旨岐趨則瀉火補陽爭門角立黨同伐異欲為闡發前賢恐先與經旨相謬古今元氣不甚相遠說五方風土異宜古今元氣不同醫林每奉此二語為治病立方之要旨以為西北高燥多寒東南卑濕多熱高燥則筋骨徑強卑濕則肌肉柔弱此分形勢之剛柔非以判本原之強弱故內經異法方宜論五常政大論聖人早為詳言之至古今元氣不同則愚竊有說焉皇古之世壽稱千百薦紳先生難言之或者書缺有間未足徵信歟尚書載自帝堯以來則皆彰彰可考所謂元氣之厚薄必徵諸壽數之短長故古人之元氣不可見而古人之壽數有可稽唐虞三代已不聞有數百歲之人觀之孔顏尤明驗也仲師誕生於漢為制方之祖其用藥也不啻數倍於今由其察脈真審證確任使精專一湯日作數服病愈或不終劑蓋有是病必用是藥去疾務盡斷斷然也然非謂漢時氣厚則可也古者以百歲為上壽七八九十者為老遞降而夭殤自漢迄今果有異歟蓋至誠無息天地之體未有久而漸薄之理惟天地無心於造物人稟天地之氣以生者原各得此百年之用而修短不齊者人自有其厚薄耳今古一轍也不然軒岐垂教長沙祖述豈專為一方一代而言哉若謂今之人稟氣日薄則善乎徐洄溪有草木之性隨之亦薄之論此又不移至理也自元氣不同之說行群以古法不宜於今麻桂慮其亡陽薑附畏其劫陰柴葛以升而代之硝黃以厲而制之即偶然一用不過數分病則猶是也藥則不及矣安能奏效乎因是邪不去正立亡始之以謹慎愛之者終之以因循害之也故愚以為學者當專務審證辨脈既得證因之本幸勿拘元氣不同之見當宗古人用藥而稍減之矯今人立方而增重之庶幾病氣速除生機不息矣鼎也學識淺陋有志未逮書此以俟之四時皆有傷寒說三陽傷寒俱有表證至於三陰既無表證可據而又不必一日太陽二日陽明循經而傳卒然直中無拘太少今試有人卒然患得三陰條脈證醫者診視將不知目為何病無論治之也故有謂南地無傷寒者非無傷寒實有之而難於識難於治也寒者天地之一氣傷寒者舉一以名書一百一十三方果皆治寒之劑哉猶魯史錯舉四時而名春秋也竊謂傷寒一證不特霜降以後春分以前有之即三時皆有之不過因時易名春溫夏暑其證治已全具於三百九十七法中在學者能通其變耳是傷寒實備六氣之治厥後或專論溫熱或專主三焦或主心營肺衛要不過傷寒中之一氣一經未足以窺全豹也讀書貴在參悟不可如小僧縛律如邪中三陰不必皆寒故三陰亦有熱下證直中三陰多兼內傷故三陰每多溫補證又況外感不出六經內傷無過五臟然則傷寒一書並可以概雜病何時何地無之哉溯心源於長沙當必沉潛反復於其書猶必詳審於無表證之治則官牆雖峻庶幾可窺姚德培幼科似驚非驚辨幼科驚症自喻氏以食痰風驚四字立名大剖從前之訛實為確論葉香巖亦宗之然更有未盡者近多冬令氣暖失藏入春寒溫間雜小兒吸收其邪先傷肺經起自寒熱氣粗延綿失治漸從胞絡內傳上部雖有微汗而痰多鼻煽煩躁神蒙病家惶懼輒云變為驚症動用香開妄投金石以致陰液消亡熱勢愈張正不敵邪肝風陡動漸見肢牽目竄痙閉發厥勢多傾敗若於病未猖撅之前先以辛涼開肺繼以甘寒化熱佐以潤劑降痰兩候自能痊可此蓋溫邪陷入陰液內耗而動肝風實非驚恐致病也若誤以驚藥治之恐幼稚之含冤不少故為之一辨痘科伏毒急於悶症說痘之一症先賢立論甚詳但近時氣候變遷竟有不同於向日者莫甚於伏毒而為時癘壅遏初起寒熱悠悠腰腹並無痛楚兩潮而見點亦色潤而形單並非要害之處身熱未解得嚏便通根窠雖立不易掀發一到三朝神蒙氣喘斑點全無唇不腫而口不渴火伏內攻迅如反掌痘未退縮即已喘閉告竭雖多識者進以芳香雙解大劑劫奪一無奏績亦未如之何也已矣唐立三續刻司天運氣贅言內經氣交變大論詳言歲運六元正紀大論詳言司天在泉而今似有不驗者何歟蓋歲運已分太少而一歲之中再分為五運五運之中又分主客主客之中又分太少司天在泉再與間氣分而為六六氣之中又分主客是每候中必有歲運與司天在泉及主運客運主氣客氣六者矣角徵宮商羽與風火濕燥寒雜合於一時變化靡窮無怪執歲運之說者司天在泉不驗執司天在泉之說者歲運不驗執五運六氣之說者歲運與司天在泉皆不驗幾疑古聖賢書為不可盡信矣不知五運六氣經文雖逐一分言而未及合參之理然天元紀六微旨二篇論至天符歲會則參合而言如天符乃歲運與司天相會奉天行令而主半年譬之相輔也故曰執法也故中其病者危而速也歲會乃歲運與年辰相會猶為平氣而主一年譬之方伯也故曰行令也故中其病者徐而持也至於太乙天符則司天歲運年辰三者會合偏盛極焉故中其病者暴而死也吾儕在醫喻醫如一方中純寒純熱其性自偏服之未有不驗者其非天符歲會之年五行錯雜猶之一方中苦辛相制寒熱雜陳則氣味皆輕自不覺其利害耳天符歲會如此可知五運六氣亦須參合以類推矣內經未言及此者提其綱而略其目也然余更有說者經言中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死曰中曰其乃指偏勝之時即中此偏勝之邪於是其病如斯非泛言其年得病無論風寒暑濕燥火一概如此斷也況偏勝之時雖必有其邪亦非舉世之人而盡中之也或起居不慎或寒暖失宜凡屬外感皆然再壯者氣行則散怯者著而為病則是中其邪者本非常有何謂經文之不驗耶愚意以為運氣之說如此抑更有釋天符太乙之說者謂非一年之病皆然當以得病之一日為言如戊子日亦稱天符戊午日即為太乙似乎近理而與中其二字究隔一層仍當作值其日而中其邪或合以其年其日而中其邪如此推之竊謂斷無不驗者周身經絡總訣有小序治病須分經絡古人以經界喻之猶夫射之的御之範也靈樞經脈一篇為我醫所必讀惟是其文參差繁復習者苦之東垣編為歌訣國朝汪訒庵更為諧暢可謂記誦無難矣惟是熟此經脈於逐經之起止循行雖己了了而人之身體每一處有兩三經或四五經錯綜循及者皆散見於各經之下臨證倉卒未免或遺烈不揣愚陋竊以人身自巔至足凡十二經絡行及之所匯而輯之再奇經八脈除帶脈及陰陽維蹺皆簡明易曉可無纂輯外其沖任督三經亦為摘入仿四六之體編為俚句而不拘拈對不嫌粗俗惟求便於記誦俾人之身體四肢一云某處便識為某經某絡實為臨證辨經分經議治之捷徑但不敢曰熟此總訣竟可置經文而不讀也譬之本草綱目既已按藥而治病復有本草類方為之按病以集方二者縱橫為用尤為心目瞭然耳頭上諸脈蓋聞手之三陰從藏走手手太陰肺少陰心厥陰心包手之三陽從手走頭手少陽三焦陽明大腸太陽小腸足之三陽從頭走足足太陽膀胱陽明胃少陽膽足之三陰從足走腹足太陰脾少陰腎厥陰肝靈樞逐一而分言茲乃合編而便讀膀胱之脈交於巔肝與督脈會於巔絡腦須知膀督惟欲便於誦讀故用簡字訣余仿此髮際循乎胃脈胃至額顱髮際下為額顱膽抵頭角上額者督與膀胱在內直上出額者其惟肝脈在外直出目系連於肝脈心之支者並系目之內角名曰內眥小支至而膀胱起胃經還約於其旁小腸之支者至目內眥膀胱之脈起於目內眥胃脈起於鼻之交頞中旁約太陽之脈下循鼻外約一作納目之外角名曰鋭眥膽接焦支三焦之支者至目鋭眥膽脈起於目鋭眥小腸亦至目下為䪼音拙焦膽小腸而合至三脈俱支者兩旁為頰大小肝焦而上下夾面橫骨為頰大腸貫頰小腸上頰肝與三焦俱下頰四脈亦俱支者小腸之支斜絡於顴督脈至於鼻柱胃脈起於交頞即山根大腸之支挾鼻孔而交中挾口從下齒還出挾口交人中左之右右之左上挾鼻孔至迎香穴而終交足陽明經胃經之脈循鼻外而挾口環唇肝又環於唇內胃又交於承漿下唇陷中胃經之脈入上齒大腸之支入下齒頷前大迎胃脈出而膽支下腮下為頷頷前一寸三分動脈陷中為大迎乃胃經穴頷下為頤胃脈循而任脈上胃脈循頤後下廉耳之上角焦支出而膀支至客主人穴膽出走而胃脈過耳前上廉起骨曰客主人乃膽經穴膽脈之支者出走耳前至目鋭眥後胃脈上耳前過客主人三焦之孫脈出走客主人前靈樞云經脈為里支而橫者為絡絡之別者為孫此支之歧者故曰孫脈後仿此小腸與焦膽三支併入耳中膽脈焦支系於耳後膽支胃脈循在頰車耳下曲骨為頰車咽有小心脾腎之脈小腸脈循咽心脈之支者挾咽脾脈挾咽腎脈至咽喉為胃支腎脈之循二脈循喉嚨肝循喉後而入咽顙肝脈循喉嚨之後上入咽顙咽顙一名頏顙在上齶後脾連舌本而散舌下腎脈挾乎舌本胃支下在人迎結喉旁一寸五分動脈此為諸陽之會先須大略而陳在身諸脈原夫腦後為項膀胱督脈與焦支兩旁為頸大小腸支同膽脈肩髃骨之前廉大腸出之肩後之下為膊膀胱循也焦膽小腸交合於肩會於大椎者為肩腎經督脈並貫於脊脊骨兩旁第一行相去各一寸五分挾脊肉為膂膀脈循之而挾脊脊骨兩旁第二行相去各三寸成片骨為胛音夾小腸繞而膀支貫至於肩前陷下名曰缺盆焦膽胃腸併入其中是以膽脈循胸三焦布膻上焦兩乳中間為膻中乳內廉乃胃經直下腋之中分膽經包絡心包絡亦有直者支者之分恐辭句繁復故此處支者僅云包絡下文正脈乃用心包二字以別之腋下為包絡之過心直下而肺橫出脅裡為膽脈之循心包出而肝經布脅骨之下為季脅須識膽經之過臍下四寸為中極當知任脈之起任脈起於中極之下然而任脈當臍沖胃挾臍脾脈入腹胃支循腹肝脈上抵乎小腹膽胃出入於氣街臍下毛際兩旁動脈為氣街一名氣衝乃胃經穴膽繞毛際曲骨之外為毛際肝環陰器此在身軀之脈所當臚列而明臟腑中諸脈其在臟腑之脈太陽與少陰為表裡手太陽小腸少陰心足太陽膀胱少陰腎少陽與厥陰為表裡手少陽三焦厥陰心包足少陽膽厥陰肝陽明與太陰為表裡手陽明大腸太陰肺足陽明胃太陰脾凡此六經脈皆互絡手足同然無煩詳贅如肺脈絡大腸大腸脈絡肺之類十二經皆仿此更有肺之一臟心直上而腎直入胃之一腑肝脈挾而肺小循肝脈挾胃肺脈還循胃口小腸之脈抵胃心有腎支之絡肝有腎經之貫脾支又注於心中肺脈自起於中焦心下有膈惟膀胱為無涉十有一經皆上下而貫之心下隔膜遮隔濁氣不使上薰心肺惟膀胱之脈挾脊抵腰中入循膂絡腎屬膀胱故不貫膈此屬臟腑之間並須熟諳者手經諸脈論乎肩肘之間乃號為臑音柔俗名大臂臑之內廉有三肺循前而心循後包絡恰循乎其問臑之外廉有三小循後而大循前三焦乃循乎其外臑下為肘三焦上貫內廉尺澤包絡入之包絡之支者入肘內陷中尺澤穴肺則下於內前心又下於內後肺脈下肘中心脈下肘內惟肺脈行前心脈行後心包行其中間為別小腸出於內側兩筋之間大腸入於外廉肘下為臂包仍在中即上文支者大循上而小循下心脈仍循內後廉上渭下廉之內仍循肺脈臂外兩骨之間還出三焦肺入寸口而循魚際關前動脈為寸口大指後肉隆起處為魚魚際其間穴名心抵鋭骨而入後廉心脈抵掌後鋭骨之端入掌內後廉包絡直入於掌中從曲澤行掌後兩筋之間橫紋陷中入掌中三焦仍循乎表腕大腸出於合谷而上入兩筋之中合谷俗名虎口大腸經穴小腸循於外側而出腕下之踝循手外側上腕出踝中踝音華上聲腕外兌骨肺脈出於大指包絡出於中指次指為肺支腸脈之交肺脈之支者直出次指內廉出其端大腸之脈起於次指之端四指為包孫焦脈之接三焦又上出小次之間小指為心脈小腸之接所謂手經大略如斯足經諸脈至如尻上為腰膀胱脈抵背脊下橫骨為腰腰下為臀膀支貫之兩旁捷骨之下名髀樞而膽橫膀過一名髀厭膽脈橫入髀厭中膀胱之支者過髀樞前面氣街之下號髀關而胃經直下股之內廉前廉脾而後廉腎又肝脈內循於股陰股外為髀後膀支而前胃脈髀前膝上六寸起肉為伏兔胃脈抵之又膽脈下循於髀陽循髀外行太陽陽明之間是以挾膝筋中為臏即膝蓋骨仍屬胃經之直下而膝內脾經內前廉膝外膽脈外廉膝後曲處為膕還是膀支之直入而腎出肝上俱在內廉腎脈出膕內廉肝脈上膕內廉脾腎上於腨內腨足肚也二脈上踹內廉膀支貫於腨外從膕中下貫腨內出外踝之後膽下於外輔骨前而直抵絶骨之端髀骨為輔骨外踝上為絶骨肝斜於脛胻內側而胃循脛外之廉內踝有脾前腎後之分外踝有膽前膀後之別跟上兩旁內外曰踝大趾節後為核骨脾經脈過足外側骨為京骨膀脈支循腎入跟中胃膽循跗跗上廉乃肝經循處足心中有腎脈斜趨湧泉穴大趾甲後屬膽支肝脈之交大趾內側為胃支脾脈之接中趾內外分胃直胃支之入四趾之間又膽經直入而終膀支至於小趾之外腎脈起於小趾之下足經之脈又如此也
