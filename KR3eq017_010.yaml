body:
  text: 卷十汪續功虛勞論虛勞之病皆由內傷而無外邪也如酒傷肺則濕熱薰蒸肺陰消爍色傷腎則精室空虛相火無制思虛傷心則血耗而火易上炎勞倦傷脾則熱生而內伐真陰惟忿怒傷肝有二鬱怒則肝火內熾而灼血大怒則肝火上升而吐血此五者皆能勞其精血道經云涕唾津精汗血液七般靈物總屬陰陰虛內熱而成虛勞之症大約酒色為多然有童子未室而患此症者或有先天不足或稟母氣陰虛其師尼寡婦室女愆期氣血鬱結以致寒熱如瘧朝涼暮熱飲食不思經期不準或致閉絶而成此病者多由鬱火內蒸所致也以上論致病之由以下論真陰易虧方書言此症者皆以氣虛血虛陰虛陽虛混同論治不知氣虛者面白無神言語輕微四肢無力脈來微弱陽虛者體冷畏寒手足逆冷溺清便溏脈沉小遲此二者能服參耆溫補乃為受補可治斯氣虛陽虛之症也雖血脫者亦有補氣之法乃指卒暴失血素非血虛之人如新産之類耳其餘患此症者經云一水不能勝五火五火者五志之火也一水者腎中真陰之水也水即精也即如女子二七而天癸至男子二八而天癸至非陰衰於前而陰成之難乎又言人年四十而陰氣自半非陰衰於後而陰凋之易乎所謂陰者即我之精而造我之形者也人生全盛之數前後止二十餘年故丹溪引日月之盈虧以為陽常有餘陰常不足而王節齋則以為陰虛成病者十有八九陽虛成病者百無一二蓋以節欲者少縱欲者多耳以下敘五藏虛證其為病也在腎則為腰脊腿痠或攸隱而痛為骨蒸盜汗或至夜發熱為遍身骨酸或疼痛如折為夢泄遺精為耳中鳴為足心熱在心則為驚悸怔忡為掌中乾熱為虛煩無寐或夢魘不寧為口苦舌乾或口舌糜爛在肺則為痰嗽乾咳為氣逆喘促為鼻中氣熱為顴紅吐衄甚則吐涎白沫側眠咽痛音啞聲嘶在肝則為寒熱如瘧為頸項瘰癧為脅脹肋疼為兩目澀痛為頭暈為眼花為多怒為吐血在脾則為食減不化為噁心嘔吐為脹滿腹痛為腸鳴泄瀉肌肉消瘦此皆五藏虛勞之本症經曰治病必求於本須審其因何致損何藏受傷如因於色者則知腎傷縱有他經現症亦當補腎為主而兼治他症因於酒者又當以清肺為先以下敘標本傳乘既審標本再明傳變如腎傳心心傳肺肺傳肝肝傳脾脾再傳腎此傳其所勝之藏侮而乘之謂之賊克大凶之兆經曰諸病以此相傳者死謂五藏以次相傳而克遍也難經曰七傳者死謂如病始於腎而脾復傳腎是謂六傳已盡一藏不可再傷也又如腎病不傳心而傳肺此間一藏而傳於生我之母以母子氣通也如腎病不傳心肺而傳肝此間二藏而傳於己生之子母病及子也如腎病不傳心肺肝而傳脾此間三藏而傳已所不勝之藏經所謂輕而侮之也傳乘不明豈能療病以下辨誤治虛勞一症偏於陰虛者居多而醫之誤治者有七試詳言之一曰誤認陽虛命門之火龍火也亦謂之真陽如果腎中陰盛龍火不能安其位而為上焦假熱面赤煩躁口渴等症口雖渴而不欲飲足冷過膝小便清長右尺脈沉小而遲或浮大無根此陰盛逼陽之假症如夏至一陰生水底冷而天上熱龍為陽物隨陽而上升宜用八味之屬冰冷與飲得引浮火歸元如冬至一陽來復地中水暖而龍歸大海也至若虛勞之症是因腎水真陰虛極水不攝火火因上炎而致面赤唇紅口鼻出血齒痛齒衄雖亦龍火上炎與虛陽上浮不同縱有下部惡寒足冷此因虛火上升所致非真陽衰而然故其小便必黃赤其脈必帶數有內熱的症可據設誤用引火歸元之法是抱薪救火上焦愈熱而咳喘燥渴益甚咽痛喉爛諸症至矣二曰誤認中寒腹痛之屬於虛寒者綿綿痛而無增減喜熱手按熱飲食泄瀉之屬於虛寒者水穀不化而澄徹清冷必有虛寒之脈證可憑然後用之有效今人一見脹滿腹痛食不消化腸鳴泄瀉等症便認為虛寒而投理中溫燥之劑再補其陽則陽益亢而陰益竭矣更有見其脹滿泄瀉遂引經文清氣在下則生飧泄濁氣在上則生䐜脹而用補中益氣反提陰火上逆以致咳喘頻增吐衄交至而立見危亡此其溫補得售者不過助陽之藥能使胃氣一時暫壯飲食增加彼此相誇至死不悟良為可憫三日誤認外感世之真陰虛而發熱者十之六七亦與外感無異火逆衝上則頭脹微痛火熱壅肺則有時鼻塞陰虛陽陷入里則灑浙惡寒陰虛陽無所附則浮越肌表而熱但其發時必在午後先灑浙惡寒少頃發熱熱至寅卯時盜汗出而身涼或無微寒而但午後發熱必現腎虛症或兼唇紅顴赤口渴煩躁六脈搏數或虛數無力此宜大劑滋陰如保陰六味之屬若誤為外感而表之則魄汗淋漓諸虛蜂起或有失血之人表之無汗經所謂奪血者無汗也再強發之必然吐衄為下厥上竭之症此尤孟浪之流也四曰苦寒瀉火之誤實火為病可以直折虛火為病非寒可清非惟不能清熱抑且敗其胃氣食少瀉多將何療治甚者見其燥結肆用硝黃以通之不知腎主二便腎主五液腎液既虧自不濡潤滋其陰潤其燥而便自通彼既虧之陰豈能勝硝黃之攻伐乎五曰二陳消痰之誤痰在脾經者名曰濕痰其痰滑而易出或稀如水者名曰痰飲濕者燥之半夏自為正治若陰水不足肺受火侮津液凝濁不生血而生痰此當潤劑滋陰使上逆之火得返其宅痰自清矣二陳之燥立見其殆六曰參耆助火之誤夫虛勞之可受參耆者肺必無熱者也肺脈按之而虛必不數者也故有土旺而生金勿拘拘於保肺之説古人每用之而奏功今則火已爍金而咳矣火蒸津液而化為濃痰矣君相亢甚而血隨上逆矣猶引陽生陰長虛火可補之説漫用參耆因之陽火愈旺金益受傷所以好古有肺熱還傷肺節齋有食參必死之叮嚀也七曰治療過時上古聖人不治已病治未病如勞神者常養其心勞倦者常補其脾多怒者常滋其肝血多飲者常清其肺熱好色者峻補其腎水仲景曰凡人有病不時即治隱忍冀延必成痼疾所以終罕得愈者以內熱之症人多易忽自恃飲食如常起居如舊仍縱恣酒色逮至病已成而後藥之譬之渴而穿井鬥而鑄兵不亦晚乎以下三大治法然而治之最難有三大要法不可不講也一曰補腎水經云腎者主水受五臟六腑之精而藏之精藏於此氣化於此精即陰中之水也氣即陰中之火也故命門之水火為十二臟之化源火不畏其衰水則畏其少所以保陰六味左歸之屬皆甘寒滋水添精之品補陰以配陽正王太僕所謂壯水之主以制陽光丹溪所謂滋其陰則火自降譬之燈殘火焰添油則焰光自小也然須制大其劑長久服之以陰無速補之法也至若因於酒者清金潤燥為主而保陰之屬仍不可廢蓋補北方正所以瀉南方而救肺也因於思慮者清心養血為主而佐保陰之屬所謂水壯而火熄勿亟亟於清心是也因於勞倦者培補脾陰為主而佐保陰之劑經曰有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎故知勞倦傷脾內熱者必及腎也若忿怒傷肝動血保陰六味大為正治蓋水旺則龍火不炎雷火亦不發乃腎肝同治之法也二曰培脾土脾胃為後天根本經曰安穀則昌蓋精生於穀飲食多自能生血化精雖有邪熱藥得以制之久則火自降而陰自復也若脾胃一弱則飲食少而血不生陰不能以配陽而五藏齊損故越人歸重脾胃而言一損損於肺皮聚而毛落二損損於心血脈不能營養藏府三損損於脾飲食不為肌膚四損損於肝筋緩不能自收持五損損於腎骨痿不能起於床從上而下者過於胃則不治至骨痿不能起於床者死從下而上者過於脾則不治至皮聚而毛落者死所以仲景治虛勞惟用甘藥建立中氣以生血化精一遵精不足者補之以味之旨也味非獨藥也補以味而節其勞則積貯漸富大命不傾經云陰陽形氣俱不足者調以甘藥故中氣不足者非甘不可況土強則金旺金旺則水充又男子以脾胃為生身之本女子以心脾為立命之根故治此者當以調養脾胃為主三曰慎調攝虛勞之因因於酒色者固多其因於憂愁思慮抑鬱多怒者亦不少所以童子室女不生歡笑及鰥寡僧尼易犯此病經謂非針藥之可治必須消遣情懷隨遇皆安然後療治庶能愈病乃今之患此症者徒仗諸草木奉為復元之品外則疲勞形體內則沉湎七情不知心有妄動氣隨心散氣散不聚精逐氣亡故廣成子曰必靜必清無勞汝形無搖汝精乃可以長生斯言真可為虛勞調攝之良法也豫今所論虛勞致病之因次及方書之混列更推真陰易虛之故以及標本傳乘並誤治之弊而終之以治要非敢矯當世之偏實本諸先哲發明治要豫又自驗之而不爽者故特立説以識之保陰煎自制熟地黃生地黃天門冬麥門冬玉竹龜版茯苓山藥牛膝桂圓肉人乳上藥或水煎或用石斛煎湯代水煎內熱有汗加地骨皮內熱無汗加壯丹皮腰痛加杞子杜仲或加豬腰豬脊髓盜汗加棗仁五味子忡怔不寐加棗仁咳嗽加桑白皮枇杷葉百合有痰加貝母有血加藕汁童便食少加薏苡仁泄瀉去生地天冬加山萸肉白芍大棗蓮肉肺脈按之無力者量加人參汪正希讀先祖保陰煎謹記豫先祖學舟公治虛勞有自制保陰煎一方其意旨所存蓋即固本丸集靈膏之制而加減者也二地為君壯水以制亢越之火二冬為臣保金以滋生化之源惟固本丸有人參茲去參者恐肺中有熱反致助火也代以龍眼葳蕤一以悅脾而生金滋水一以潤肺而益腎養肝二味代參非獨較參為穩當抑且貧富可以通行集靈膏有枸杞牛膝茲去杞者恐其性溫助陽用膝者取其引藥下行一汰一存權衡適當至人乳補血液為潤燥之妙品龜版補心腎實養陰之良藥統而計之即精不足者補之以味之意也然群聚沉陰靜味得無過於凝滯上阻胃納下妨脾運歟故佐以山藥茯苓一培一滲調和脾胃使無偏勝之虞且備擬加減之法以治病之變化毫無遺漏焉壯水制火補精養陰較之錢仲陽之六味張景嶽之左歸不能多讓而或更勝之乃或有議其平庸者是未籌勞者養之惟宜王道不尚霸功也先祖當年先葉香巖薛一瓢兩先生而著名制此方以療虛勞者千百人不僅為獨創之奇實上探古人之精奧世雖多高明之士而治虛勞者誰復能捨此而別求良法哉豫也痛先人之已邈幸舊笈之猶傳思濟美於後先有慚學術讀祖書之良善敢祕遺編用是梓此新方附於匯講非徒求行世亦以祈活人也沈香巖六味地黃丸方解此為補陰之主方補五藏之陰以納於腎也藏陰虧損以熟地大滋腎陰壯水之主以為君用山萸肉之色赤入心味酸入肝者從左以納於腎山藥之色白入肺味甘入脾者從右以納於腎又用三味通府者恐府氣不宣則氣鬱生熱以致消爍藏陰故以澤瀉清膀胱而後腎精不為相火所搖又以丹皮清血分中熱則主血之心藏血之肝俱不為火所爍矣又以茯苓清氣分之熱則飲食之精由脾輸肺以下降者亦不為火所爍矣夫然後四藏之真陰無所耗損得以攝納精液歸入腎藏腎受諸藏之精液而藏之矣從來囫圇看過未識此方之元妙至於此極今將萸肉山藥二味分看一入心肝一入肺脾既極分明而氣味又融洽將熟地萸肉山藥三味總看既能五藏兼入不致偏倚又能將諸藏之氣盡行納入腎藏以為統攝藏陰之主而不致兩歧至澤瀉茯苓丹皮與三補對看其配合之妙亦與三補同法制方妙義周備若此非臻於神化者其孰能之惟其兼補五藏故久服無虞偏勝而為萬世不易之祖方也八味地黃丸方解此方用附子肉桂補兩腎之陽非補兩腎中之命門也附子補氣中之陽由肺以入於腎故陽虛肺氣喘急者服之即止乃右腎之陽藥也肉桂補血中之陽由肝以入於腎故陽虛肝火上浮者服之則納乃左腎之陽藥也夫從左從右非兩腎之中可知命門居中是以一而神非以兩而化附子肉桂一氣一血兩相對待故非命門藥也如以附為補命門則以命門屬氣桂不得為補命門矣以桂為補命門則以命門屬血附不得為補命門矣總之命門為先天之氣本於始生為生氣生血之根本非草根樹皮所能補者藥餌入口從胃氣敷布然後輸入腎藏即系後天飲食之氣所化但能補益藏腑不能補益先天故前人加入地黃丸者不特附桂一氣一血即車前牛膝亦是一氣一血知母黃柏亦是一氣一血一氣一血者俱入兩腎而非命門也以命門為陽者此命門與兩腎分陰陽則命門為陽兩腎為陰命門為始生之根本即是萬物資始之干元故為元陽象坎中之一畫也非以火為陽也如以兩腎分析而論則左血為陰右氣為陽亦非以水火分也如專以一腎而論則左腎不獨有精氣亦有之右腎不獨有氣精亦有之精即為陰氣即為陽此兩腎各有陰陽故八味地黃丸各補其陰陽也唐立三四續司天運氣徵驗余曾撰司天運氣贅言已鐫入是編第七卷矣愚意以每歲每候必有歲運與司天在泉及分五運之主客六氣之主客六者雜聚變化靡窮吾儕在醫喻醫譬如一方中純寒純熱其劑自峻若苦辛相制寒熱雜陳即有所偏蓋亦微矣故天元紀六微旨二篇論至天符歲會則有中其病者速而危徐而持暴而死之別天符歲會如此可知五運六氣亦須參合以類推矣內經未言及此者提其綱而難於盡數其目也抑更有釋天符太乙者謂當以得病之一日為言如戊子日亦稱天符戊午日亦稱太乙之説茲嘉慶元年丙辰乃統一歲者太羽水運上半歲又值太陽寒水司天已為天符矣而初之主運值太角初之客運值太羽初之主氣又值厥陰風木則是六者之中三寒二風惟初之客氣值少陽相火一火孤立幾為群水所掩初之運氣天候應寒也正月初九日丙辰又天符之日水寒會聚余於去冬曾與鄰金子東屏鬍子誠齋謝子由喬暨同道唐子迎川周子思哲朱子澗溶以及門人王文海輩談及是日防受寒邪不意至期果於雞鳴時烈風震屋積雪盈庭及午雪益密紅爐不暖繒纊無溫抵夜風更壯即重裀毳幕不啻大荒冰窖矣逮詰朝風少息然寒威凜冽吹氣成凍不獨貯水缸壇插花瓶擊一旦都為冰泐甚至煙筒酒甕無不凝冰耄耋之老皆云有生以來未遇如此嚴寒諸鄰友謂余曰推之何精也余亦未料如此其驗也因而追溯乾隆三十八年癸已夏炎暑酷烈中暍而死者難以僕數試亦以運氣推之乃少徵火運而值巳歲所謂歲會也大暑後少陽相火在泉所謂同歲會也維時乃三之運四之氣客氣又值少陽相火則是七者之中火居其四至於主運少宮客運少商主氣太陰濕土五行中全未見水有陽無陰可謂亢害之至矣於是益知運氣之説不可執一而論當以六者之中角徵宮商羽與風火濕燥寒互相參究自無不驗縱不必偏甚若此始能獲應亦須以此六者主客太少何勝何遜何遠何近窮究其微必有曲驗即此癸已丙辰二歲可徵也再試以本年他運他氣推之除五行錯雜不甚偏乖者無庸瑣述小滿後交三之客氣乃太陽寒水與歲運司天相合且主客運氣之中客氣最為切近是時應有寒徵又小雪後交終之氣主運太羽主氣太陽寒水與歲運之太羽三水會聚惟是主運主氣不過時令之常非比客運客氣加臨變化顯有異徵耳十一月十五日丙辰益以天符之日寒應倍之茲乃時當夏仲衣必纊綿三之氣亦己驗焉前撰贅言可詡未謬試再觀終之氣何如五月望日識
