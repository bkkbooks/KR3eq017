body:
  text: 卷一王雲林禱告藥皇誓疏康熙三十一年壬申長至日王家瓚謹以清香禱告於藥皇曰竊聞詩云上帝臨汝無貳爾心書曰作善降之百樣作不善降之百殃又曰惠迪吉從逆凶惟影響此列聖所垂之明訓也微氓如家瓚生既不辰命復多舛蓋自先祖母五十餘年撫孤植節一線單傳以迄於今吾父衰齡望八吾母見背兩弟繼歿俱無嗣息瓚所生兒女六人亦皆以痘殤孤危至此無日不返躬自責也惟此瘍醫世業謹守家傳凡見諸苦惱無論貧富先懷悲憫耿耿此心惟無可表第自揣以褊淺之見識荷司命之擔當任大責重豈盡無訛清夜深思愈增憂懼幸而歲戊辰竟得子已已冬出痘矣庚午又得子今冬又出痘矣家瓚向天稽首末由報答鴻麻誠恐遷善不力惡將蝟集舜蹠之分間不容髮敢矢誓願為承先裕後之基址其首重者忍辱安貧畢生兢守誓不趨時誇耀或遇瀕危之症悉心療治誓不惜名恝置或遇輕淺之疾即時安慰誓不張皇顯功或病果疑難學識未到必詳審以待高明誓不耽延貽誤或遇富厚之家誓不幸災攫利或遇貧困之人隨力救援誓不市恩而沾譽或遇當道搢紳隨緣調治誓不媚諛以玷祖先嗟乎人命至重冥報難逃執一得以誤人昧良心而罔利均弗為之若知之而自犯之是自絕於天也設家瓚世味攖心初終易轍陽譴陰誅交加不悔神抵在上其明鑑之惟是力有所不逮情有所不忍目擊貧病無告煙火不繼之家每有不堪之慘徹底躊躇點金乏術今擬於薪水布袍之外量為留余制諸藥餌為救療貧病之萬一猶以母靈暴露力不從心然一安慈魄此事亦誓必為之也所仰祈者老父壽而康寧優遊晚景二子克自振立以延列祖書香以報張太君之苦節則臣願足矣若夫一身之榮辱則家瓚命相已定不敢妄祈不勝戰慄投誠之至丙午之秋東作陰騭文頌言畢覆命兒輩於祖筆一卷中檢先大父緘齋公禱告藥皇誓疏底稿讀之怦怦心動鳴呼以慈悲為命脈以神明為監史以忍辱為安貧之極致以種德為詒謀之首務苟非深明於天人相與之微有能如是之憂勤惕厲者乎東老矣幸食舊德以迄於今綿及曾元識字讀書皆先人之賜也謹錄一通俾兒孫朝夕觀省相與動心忍性溫溫惴惴無忝所生是則予小子之責也夫孫岱東百拜謹識時年七十有三此篇誓疏雖非講學之文然惟有此實心斯有實學則是此心亦吾醫所宜亟講也雲林先生之後迄今五世矣不僅良醫代出抑且書香相繼安知非此存心之報哉當弁卷首以志我儕講學之一證大烈識葉天士葉天士名桂號香巖世居閶門外下塘所著溫證論治二十則乃先生遊於洞庭山門人顧景文隨之舟中以當時所語信筆錄記一時未加修飾是以辭多結屈語亦稍亂讀者不免晦目烈不揣冒昧竊以語句少為條達前後少為移掇惟使晦者明之至先生立論之要旨未敢稍更一字也溫證論治溫邪上受首先犯肺逆傳心胞肺主氣屬衛心主血屬營辨營衛氣血雖與傷寒同若論治法則與傷寒大異蓋傷寒之邪留戀在表然後化熱入裡溫邪則化熱最速未傳心胞邪尚在肺肺合皮毛而主氣故云在表初用辛涼輕劑挾風加薄荷牛蒡之屬挾濕加蘆根滑石之流或透風於熱外或滲濕於熱下不與熱相搏勢必孤矣不爾風挾溫熱而燥生清竅必乾謂水主之氣不能上榮兩陽相劫也濕與溫合蒸鬱而蒙痹於上清竅為之壅塞濁邪害清也其病有類傷寒驗之之法傷寒多有變症溫熱雖久總在一經為辨前言辛涼散風甘淡驅濕若病仍不解是漸欲入營也營分受熱則血液受劫心神不安夜甚無寐或斑點隱隱即撤去氣藥如從風熱陷入者用犀角竹葉之屬如從濕熱陷入者用犀角花露之品參入涼血清熱方中若加煩躁大便不通金汁亦可加入老年及平素有寒者以人中黃代之急速透斑為要若斑出熱不解者胃津亡也主以甘寒重則如玉女煎輕則如梨皮蔗漿之類或其人腎水素虧病雖未及下焦每多先自彷徨此必驗之於舌如甘寒之中加入鹹寒務在先安未受邪之地恐其陷入耳若其邪始終在氣分流連者可冀其戰汗透邪法宜益胃令邪與汗並熱達腠開邪從汗出解後胃氣空虛當膚冷一晝夜待氣還自溫暖如常矣蓋戰汗而解邪退正虛陽從汗泄故漸膚冷未必即成脫症此時宜安舒靜臥以養陽氣來復旁人切勿驚惶頻頻呼喚擾其元氣但診其脈若虛軟和緩雖倦臥不語汗出膚冷卻非脫症若脈急疾躁擾不臥膚冷汗出便為氣脫之症矣更有邪盛正虛不能一戰而解停一二日再戰汗而愈者不可不知再論氣病有不傳血分而邪留三焦猶之傷寒中少陽病也彼則和解表裡之半此則分消上下之勢隨症變法如近時杏樸苓等類或如溫膽湯之走泄因其仍在氣分猶有戰汗之門戶轉瘧之機括也大凡看法衛之後方言氣營之後方言血在衛汗之可也到氣才宜清氣乍入營分猶可透熱仍轉氣分而解如犀角元參羚羊等物是也至入於血則恐耗血動血直須涼血散血如生地丹皮阿膠赤芍等物是也若不循緩急之法慮其動手便錯耳且吾吳濕邪害人最多如面色白者須要顧其陽氣濕勝則陽微也如法應清涼用到十分之六七即不可過涼蓋恐濕熱一去陽亦衰微也面色蒼者須要顧其津液清涼到十分之六七往往熱減身寒者不可便云虛寒而投補劑恐爐煙雖熄灰中有火也須細察精詳方少少與之慎不可漫然而進也又有酒客裡濕素盛外邪入裡與之相搏在陽旺之軀胃濕恆多在陰盛之體脾濕亦不少然其化熱則一熱病救陰猶易通陽最難救陰不在補血而在養津與測汗通陽不在溫而在利小便較之雜症有不同也再論三焦不從外解必致裡結裡結於何在陽明胃與腸也亦須用下法不可以氣血之分謂其不可下也惟傷寒熱邪在裡劫爍津液下之宜猛此多濕邪內搏下之宜輕傷寒大便溏為邪已盡不可再下濕溫病大便溏為邪未盡必大便硬乃為無濕始不可再攻也再人之體脘在腹上其位居中按之痛或自痛或痞脹當用苦泄以其入腹近也必驗之於舌或黃或濁可與小陷胸湯或瀉心湯隨症治之若白不燥或黃白相兼或灰白不渴慎不可亂投苦泄其中有外邪未解裡先結者或邪鬱未伸或素屬中冷者雖有脘中痞痛宜從開泄宣通氣滯以達歸於肺如近世之杏蔻橘桔等輕苦微辛具流動之品可耳又有舌上白苔黏膩吐出濁厚涎沫者其口必甜此為脾癉乃濕熱氣聚與穀氣相搏土有餘也盈滿則上泛當用佩蘭葉芳香辛散以逐之若舌上苔如鹼者胃中宿滯挾濁穢鬱伏當急急開泄否則閉結中焦不能從募原達出矣再舌苔白厚而乾燥者此胃燥氣傷也滋潤藥中加甘草令甘守津還之意舌白而薄者外感風寒也當疏散之若薄白而乾者肺液傷也加麥冬花露蘆根汁等輕清之品為上者上之也若苔白而底絳者濕遏熱伏也當先泄濕透熱防其即乾也此可勿憂再從裡而透於外則變潤矣初病舌即乾神不昏者宜急養正微加透邪之藥若神已昏此內潰不可救藥矣前云舌黃或濁當用陷胸瀉心須要有地之黃若光滑者乃無形濕熱已有中虛之象大忌前法其臍以上為大腹或滿或脹或痛此必邪已入裡表症必無或存十之一二亦須驗之於舌或黃甚或如沉香色或如灰黃色或老黃色或中有斷紋皆當下之如小承氣湯用檳榔青皮枳實元明粉生首烏等皆可若未現此等舌不宜用此等藥恐其中有濕聚太陰為滿或寒濕錯雜為痛或氣壅為脹又當以別法治之矣再黃胎不甚厚而滑者熱未傷津猶可清熱透表若雖薄而乾者邪雖去而津受傷也苦重之藥當禁宜甘寒輕劑養之再論其熱傳營舌色必絳絳深紅色也初傳絳色中兼黃白色此氣分之邪未盡也泄衛透營兩和可也純絳鮮澤者胞絡受邪也宜犀角鮮生地連翹鬱金石菖蒲等清泄之延之數日或平素心虛有痰外熱一陷裡絡即閉非菖蒲鬱金等所能開須用牛黃丸至寶丹之類以開其閉恐其昏厥為痙也再論舌絳而乾燥者火邪劫營涼血清血為要色絳而舌心乾者乃心胃火燔劫爍津液即黃連石膏亦可加入其有舌心獨絳而乾者亦胃熱而心營受灼也當於清胃方中加入清心之品否則延及於尖為津乾火盛之候矣舌尖獨絳而乾此心火上炎用導赤散瀉其腑若煩渴煩熱舌心乾四邊色紅中心或黃或白者此非血分也乃上焦氣熱爍津急用涼膈散散其無形之熱再看其後轉變可也慎勿用血藥反致滋膩留邪至舌絳望之若乾手捫之原有津液此津虧濕熱薰蒸將成濁痰蒙閉心胞也舌色絳而上有黏膩似苔非苔者中挾穢濁之氣急加芳香逐之舌絳而抵齒難伸出口者痰阻舌根有內風也舌絳而光亮胃陰亡也急用甘涼濡潤之品舌絳而有碎點黃白者將生疳也大紅點者熱毒乘心也用黃連金汁其有雖絳而不鮮乾枯而痿者此腎陰涸也急以阿膠雞子黃地黃天冬等救之緩則恐涸極而無救也再有熱傳營血其人素有瘀傷宿血在胸膈中舌色必紫而暗捫之潮濕當加散血之品如琥珀丹參桃仁丹皮等否則瘀血與熱相搏阻遏正氣遂變如狂發狂之症若紫而腫大者乃酒毒衝心紫而乾晦者腎肝色泛也難治舌若淡紅無色或乾而色不榮者乃是胃津傷而氣無化液也當用炙甘草湯不可用寒涼藥再有不拘何色舌生芒刺者皆是上焦熱極也當用青布拭冷薄荷水揩之即去者輕旋即生者險矣舌苔不燥自覺悶極者屬脾濕盛也或有傷痕血跡者必問曾經搔挖否不可以有血而便為枯症仍從濕治可也再有神情清爽舌脹大不能出口者此脾濕胃熱鬱極化風而毒延於口也用大黃磨入當用劑內則舌脹自消矣舌無苔而有如煙煤隱隱者慎不可忽視如口渴煩熱而燥者平時胃燥也不可攻之宜甘寒益胃若不渴肢寒而潤者乃挾陰病宜甘溫扶中此何以故外露而裡無也舌黑而滑者水來剋火為陰症當溫之若見短縮此腎氣竭也為難治惟加入參五味子或救萬一舌黑而乾者津枯火熾急急瀉南補北若黑燥而中心厚者土燥水竭急以鹹苦下之若舌白如粉而滑四邊色紫絳者溫疫病初入募原未歸胃腑急急透解莫待傳入而為險惡之症且見此舌者病必見凶須要小心凡斑疹初見須用紙燃照看胸背兩脅點大而在皮膚之上者為斑或云頭隱隱或瑣碎小粒者為疹又宜見而不宜多見按方書謂斑色紅者屬胃熱紫者熱極黑者胃爛然亦必看外症所合方可斷之春夏之間濕病俱發斑疹為甚如淡紅色四肢清口不甚渴脈不洪數此非虛斑即屬陰斑或胸前微見數點面赤足冷或下利清穀此陰盛格陽於上當溫之若斑色紫而點小者心胞熱也點大而紫胃中熱也斑黑而光亮者熱毒極熾雖屬不治然其人氣血充者依法治之或有可救若黑而晦者必死黑而隱隱四旁赤色者乃火鬱內伏大用清涼透發間有轉紅而可救者又有夾斑帶疹皆是邪之不一各隨其部而泄然斑屬血者恆多疹屬氣者不少斑疹皆是邪氣外露之象發出之時宜神情清爽方為外解裡和如斑疹出而昏者此正不勝邪而內陷或胃津內涸之候矣再有一種白㾦小粒如水晶色者此濕熱傷肺邪雖出而氣液枯也必得甘藥補之若未至久延氣液尚在未傷乃為濕鬱衛分汗出不徹之故當理氣分之邪枯白如骨者多凶氣液竭也再溫熱之病看舌之後亦須驗齒齒為腎之餘齦為胃之絡熱邪不燥胃津必耗腎液且二經之血走於此處病深動血結瓣於上陽血色紫紫如乾漆陰血色黃黃如醬瓣陽血若見安胃為主陰血若見救腎為要然豆瓣色者多險惟症尚不逆者猶可治否則難治矣此何故耶蓋陰下竭陽上厥也齒若光燥如石者胃熱甚也證見無汗惡寒衛偏勝也辛涼泄衛透汗為要若如枯骨色者腎液枯也為難治若上半截潤水不上承而心火上炎也急急清心救水俟枯處轉潤為妥若咬牙齧齒者濕熱化風痙病但咬牙者胃熱氣走其絡也咬牙而脈症皆衰者胃虛無穀以內榮也此何以故虛則喜實也舌本不縮而硬牙關咬定難開者此非風痰阻絡即欲作痙症用酸物擦之即開酸走筋木來泄土故也若齒垢如灰糕樣者胃氣無權津亡而濕濁用事多死初病齒縫流清血痛者為胃火沖激不痛者為龍火內燔齒焦無垢者死齒焦有垢者腎熱胃劫也當微下之或玉女煎清胃救腎可也再婦人病溫與男子同但多胎前產後以及經水適來適斷大凡胎前病古人皆以四物加減用之謂恐邪來害妊也如熱極者有用井底泥及藍布浸冷覆蓋腹上等皆是護胎之意然亦須看其邪之可解而用之如血膩之藥不靈又當審察不可固執仍宜步步保護胎元恐正損邪陷也至於產後方書謂慎用苦寒恐傷已亡之陰也然亦要辨其邪能從上中解者稍從症用之亦無妨也不過勿犯下焦且屬虛體當如虛怯人病邪而治況產後當血氣沸騰之際最多空竇邪必乘虛內陷虛處受邪為難治也如經水適來適斷邪將陷於血室少陽傷寒言之詳悉不必多贅但數動與正傷寒不同仲景立小柴胡湯提出所陷熱邪參棗以扶胃氣因衝脈隸屬陽明也此惟虛者為合治若熱邪陷入與血相結者當宗陶氏小柴胡湯去參棗加生地桃仁查肉丹皮或犀角等若本經血結自甚必少腹滿痛輕者刺期門重者小柴胡湯去甘藥加延胡歸尾桃仁挾寒加肉桂心氣滯加香附陳皮枳殼等然熱陷血室之症多有譫語如狂之象與陽明胃熱相似此種病機最須辨別血結者身體必重非若陽明之輕便者何以故耶陰主重濁絡脈被阻身之側旁氣痹連及胸背皆為阻窒故去邪通絡正合其病往往延久上逆心胞胸中痹痛即陶氏所謂血結胸也王海藏出一桂枝紅花湯加海蛤桃仁原欲表裡上下一齊盡解之理此方大有巧妙焉陳獻傳人身一小天地論造化一陰陽也陰陽一太極也太極本無極也無極之前陰含陽也有象之後陰分陽也陰為陽母陽為陰父陽生於子極於已而一陰來姤陰生於午極於亥而一陽來復震為長男屬火火生於寅胞胎在已巽為長女屬水水生於申胞胎在亥巳亥為天地之門戶陰陽之根本也人稟健順之德以生五行之氣隱於五臟見於六腑呼吸即陰陽運輸也津液即雨露灌溉也光澤即花木榮繁也耳目即日月晦明也人身一小天地信哉善觀脈者知陰則知陽知陽則知陰可以心察可以指別可以類求可以意會可以萬全至道淵微莫逾於此順而調之真氣乃安邪氣乃正反之則病實則氣入虛則氣出氣實則熱氣虛則寒治之若何溫涼各隨其候補瀉各有其宜無虛虛無實實無太過無不及上應天光星辰象緯下副四時五行貴賤以明三部九候以察八正八風陰陽升降配天象地之說是在神悟靈機心識微妙者矣顧雨田書方宜人共識說國家徵賦單曰易知良將用兵法云貴速我儕之治病亦然嘗見一醫方開小草市人不知為遠志之苗而用甘草之細小者又有一醫方開蜀漆市人不知為常山之苗而令加乾漆者凡此之類如寫玉竹為萎蕤乳香為薰陸天麻為獨搖草人乳為蟠桃酒鴿糞為左蟠龍灶心土為伏龍肝者不勝枚舉但方書原有古名而取用宜乎通俗若圖立異矜奇致人眼生不解危急之際保無誤事又有醫人工於草書者醫案人或不識所繫尚無輕重至於藥名則藥鋪中人豈能盡識草書乎孟浪者約略撮之而貽誤小心者往返詢問而羈延可否相約同人凡書方案字期清爽藥期共曉再如藥引中生薑常寫幾片燈心常寫幾根竹葉橘葉常寫幾瓣蔥管荷梗常寫幾寸余謂片有厚薄根有短長瓣有大小寸有粗細諸如此類皆須以分兩為準又煎藥宜囑病家各藥各罐勿與他人共用恐彼煎攻克此煎補益彼煎寒涼此煎溫熱譬如酒壺泡茶雖不醉人難免酒氣此說偶見於願體集中竊以為先得我心故亦摘而贅之
