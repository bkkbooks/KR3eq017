body:
  text: 卷八朱應皆木鬱達之論內經云木鬱達之古來註釋者以達為宣吐又云用柴胡川芎條而達之愚謂此不過隨文訓釋而於達之之意猶有未盡然也夫木鬱者即肝鬱也素問云治病必求其本而鬱症之起必有所因當求所因而治之則鬱自解郁者既解而達自在其中矣矧木鬱之症患於婦人者居多婦人情性偏執而肝病變幻多端總宜從其性適其宜而致中和即為達道彼若吐若升止可以言實未可以言虛也今人柔脆者恆多豈可概施升吐哉其餘火土金水四郁古人之註釋雖於經義未必有悖然亦止可以言實止可以言外因未可以言虛未可以言內因也蓋因郁致疾不特外感六淫而於情志為更多調治之法亦當求其所因而治之則鬱自解郁者既解則發奪泄折俱在其中矣因者病之本本之為言根也源也君於務本本立而道生可師也頤毒頤字辯按時病之後多有發頤毒之症然古人又有云遺毒者愚謂當以此遺字為正蓋遺者遺留也謂餘邪未盡遺於經絡以致榮氣不從逆於肉理乃生癰腫也頤者但以部位相近而言也然今之患者發於耳下為多兩頤甚少按耳下者少陽之部也三陽以少陽為樞是餘邪從樞而出也兩頤者少陰之部也三陰以少陰為樞是亦餘邪從樞而出也病在三陽發於耳下病在三陰發於兩頤此一定之理也張石頑云過用發散引邪氾濫而頤毒多有延及膺脅肘臂如流注者則去頤益遠尚可謂之頤毒乎方藥等分解嘗讀古方每有藥味之下不注分兩而於末一味下注各等分者今人誤認為一樣分兩余竊不能無疑焉夫一方之中必有君臣佐使相為配合況藥味有厚薄藥質有輕重若分兩相同吾恐駕馭無權難於合轍也即如地黃飲子之熟地菖蒲分兩可同等乎天真丹之杜仲牽牛分兩可同等乎諸如此類不一而足豈可以各等分為一樣分兩哉或曰子言是矣然則古人之不為註定而云各等分者何謂耶愚曰各者各別也古人云用藥如用兵藥有各品猶之將佐偏裨各司厥職也等者類也分類得宜如節制之師不致越伍而譁也分者大小不齊各有名分也惟以等字與上各字連讀其為各樣分兩意自顯然今以等字與下分字連讀則有似乎一樣分兩耳千里之錯失於毫釐類如是耳窺先哲之不以分兩明示後人者蓋欲令人活潑潑地臨證權衡毋膠柱而鼓瑟也竊以為古人之用心如此不揣愚陋敢以質諸高明楊存耕保護元陽說聖人作易爻先一畫是元陽為萬物資始神變化合太和所以彖詞獨稱其大耳讀仲景傷寒首論太陽以桂枝湯為方祖誠一法立而諸法已悉具亦此經治而他經可不傳無論太陽篇內輒用桂枝即陽明表未解尚宜桂枝少陽柴胡症每合桂枝至於誤下腹痛桂枝加芍藥桂枝加大黃等湯乃屬太陰矣若夫少厥二陰風熱痰壅有半夏散及湯發表溫中有當歸四逆液涸用復脈法蛔動用烏梅丸凡此不以桂枝命名者而仍不離夫桂枝可知仲景意不特陽經宜用即陰經亦常兼顧及陽也再參金匱開卷論臟腑經絡次章治痙必先列括蔞桂枝其餘各症以桂枝法加減者復不勝枚舉此非始終體干行健教人以保護元陽哉近來風氣畏溫熱而喜寒涼每見元虛濕溫風溫等症舌白渴不欲飲者亦有用犀角地黃竹葉石膏輩病本在氣分或反引入血分或胃敗不納呃逆泄瀉輕病重重病死深為扼腕試觀大易以陽剛喻君子以陰柔喻小人若使陰道長則陽道消何以輔相裁成躋斯人共登壽域以方位論五穀利在東南以歲時論百卉敷榮春夏由此推之天包乎地氣先於血元陽實生生之本亟宜保護醫當活潑潑地雖不必偏熱而斷不可偏寒也明矣彼丹溪陽常有餘陰常不足之說故景岳非之洞見本源江淑齋跋古人云不知易者不足以言醫此淪以易理闡明醫理而以護陽立說並論及仲聖用桂枝諸方皆從護陽起見誠為確論蓋陽氣一分不盡則不死人能保護元陽則太和之氣充滿於身熙熙皞皞共躋春臺矣易以陽喻君子吾於楊君亦云然繆松心識以儒理通醫理故其指遠以易理通傷寒金匱之理故其辭文年姻家眷弟葉元符拜讀講易講醫三墳一理受業門人程清泰百拜志楊立方讀傷寒論附記嘗謂長沙之論謹嚴之中皆活法也天之氣化不一有主氣有客氣人之臟性亦不一有陰臟有陽臟春溫夏熱秋燥冬寒四時之定位也厥陰風化為初之氣少陰熱化為二之氣少陽火化為三之氣太陰濕化為四之氣陽明燥化為五之氣太陽寒化為終之氣六節之常度也故寒必傷於冬而溫與熱必在於春與夏此其大較也然而以五運言之則土運金運之遷代無常以六氣言之則司天在泉左間右間之加臨各別益之以勝復之理太過不及之數於是乎春夏亦有傷寒隆冬非無溫病所謂非其時而有其氣不可膠於節候之常素問曰至高之地冬氣常在至下之地春氣常在靈樞曰以一日分為四時日出為春日中為夏日入為秋夜半為冬皆是以活法言之說者於傷寒必主冬月於桂枝麻黃三陰諸辛熱劑必主冬月之傷寒而不可用於春夏之時拘泥時令於變化之理得毋有未備歟通天篇曰有太陰之人少陰之人太陽之人少陽之人陰陽和平之人及夫五五二十五人之政本臟篇又言二十五變昔夏英公有異稟臥即身冷如僵常服仙茅鍾乳硫黃莫知紀極小吏竊食即發疽死而太陽之人則飲啖生冷而不知節恣情房室而不加疲此其陰陽之反何啻天淵是故有從化之說從者大之氣也化者臟之性也陰臟者多寒陽臟者多熱所謂陰從陽化陽從陰化熱從寒化寒從熱化亦皆以活法言之而尤不可泥於溫涼寒燠之常也夫以運氣主客之殊加之以臟腑陰陽之別其病遂千態萬狀而莫可窮詰仲聖述軒岐之蘊廣湯液之用約之以三百九十七法一百一十三方而金匱不在其數其立法之妙為治之活於主客陰陽之變莫不融貫是在乎用之者之神而明之耳後之論足經論卒病論三綱論六氣論傷寒即雜證之一紛紛聚訟返而求之仲聖之書其活潑潑地者固無乎不包也故治病須用活法屠彜尊論白㾦白㾦一症考古方書無專條論及間有在癍疹門中發明一二究未能盡其底蘊今溫熱證中每多發出如粞如粟色白形尖者謂之白㾦有初病即見者有見而即愈者有見而危殆者有病經日久癍疹已見補瀉已施之後仍然發此而愈者泛稱時氣所致殊不知致病之由既異治療之法不同不可不與癍疹詳辨而審處之也蓋傷寒傳經熱病汗出不徹邪熱轉屬陽明多氣多血之經或由經入府受熱蒸灼營傷血熱不散而裡實表虛熱氣乘虛出於膚腠故稀如蚊跡稠如錦紋者為斑紫黑為胃爛而不治也時行風熱之氣侵入肺虛血熱之體失於清透傷及手太陰血分乘虛出於皮膚如沙如粟而色紅瑣碎者為麻或歲當火運復感時厲之毒即咽痛而成丹痧及爛喉痧之類為最劇者也至於白㾦一症則溫熱暑邪病中必兼濕為多蓋伏氣之發本從內出然必因外感及人身素蘊之濕與外觸之邪互相蒸發上甚為熱初病治法設不用清透滲解則肺為熱傷氣從中餒不能振邪外解熱漸陷於營分轉投清營滋化熱勢稍緩而肺氣亦得藉以自復所留之濕仍從上焦氣分尋隙而出於是發為白㾦以肺主氣故多發於頤項肩背胸臆之間白為肺之色光潤為濕之餘氣至此而邪始盡泄也甚有幾經補瀉之後病仍不解忽然發此而愈者以其人之氣液內復邪自外透故不治亦愈也若其根本已虛無氣蒸達多有延為衰脫者故此症以元氣未漓色潤晶瑩有神者為吉枯白乏澤空殼稀散者為氣竭而㐫總以形色之枯潤卜其氣液之竭與否也大抵此症在春末夏初暑濕之令為甚秋冬則間有之要不出乎手經受病仍從手經發泄不比足經之邪可從下解也夫肺為主氣之藏氣旺則邪從外解上泄而病愈氣衰則邪正並竭雖發必朽白無神而難治觀內經暑與濕同推仲聖痙濕暍合論益知暑熱溫邪症中多夾濕邪更無疑矣一隙微明以俟高賢正之李純修爛喉痧論爛喉痧一症古書不載起於近時而並易傳染治之者每謂太陰陽明二經風熱之毒而至爛之由亦不可不詳察也譬之於物以盛火逼之只見乾燥而不知濕熱鬱蒸所以致爛耳此症凡風熱者治宜清透濕熱者治宜清滲痰火凝結者治宜消降蓋邪達則痧透痧透則爛自止矣若過用寒涼勢必內陷其害可勝言哉夫症有可治有不可治口中作臭者謂之回陽其色或淡黃或深黃者此係痰火所致皆可治之症他如爛至小舌者鼻塞者閤眼矇矓者並有元氣日虛毒氣深伏色白如粉皮樣者皆不可治之症也總之因天地不正之氣感而受之故體有虛實之不同即症有重輕之各異耳其餘喉症痧症古人言之詳矣概不復贅祖鴻範爛喉丹痧治宜論夫丹痧一症方書未有詳言余究心是症之所來不外乎風寒溫熱時厲之氣而已故解表清熱各有所宜治之得當愈不移時治失其宜禍生反掌無非宜散宜清之兩途也其症初起凜凜惡寒身熱不甚並有壯熱而仍兼憎寒者斯時雖咽痛煩渴先須解表透達為宜即或宜兼清散總以散字為重所謂火鬱發之也苟漫用寒涼則外益閉而內火益焰咽痛愈劇潰腐日甚矣不明是理者反云如此涼藥尚且火勢勃然不察未散之誤猶謂寒之未盡於是愈涼愈遏以致內陷而斃者有之或有云是症專宜表散者余謂所見亦偏前所云寒熱之時散為先務俾汗暢而丹痧透發已無惡寒等症至此則外閉之風寒已解內蘊之邪火方張寒涼泄熱是所宜投熱一盡而病自愈矣若仍執辛散之方則火得風而愈熾腫勢反增腐亦滋蔓必至滴水下咽痛如刀割間有議用清涼者乃以郁遏誹之炎熱燎原殺人最暴此偏於散而謗匪清者之為害也彼言散之宜此言散之禍彼言寒之禍此言寒之宜要惟於先後次第之間隨機權變斯各中其窾耳再此症愈後每有四肢痠痛難以屈伸之狀蓋由火爍陰傷絡失所養宜進滋陰非同痹症此又管窺之所及敢以質之高明陳元益痧疹今昔不同治法亦異說夫痧之與痘同一胎毒也而有府藏之分焉其發也亦有出遲出速之異以伏藏之地有遠近也第痧之一證古人治法惟以升麻葛根湯為祖劑芫荽酒之外治而已其有風寒外束內毒難出而喘急者麻杏石甘湯主之若夫輕淺之證竟有不必延醫自用櫻桃核粗草紙棉紗線煎湯飲之而愈者即其發也不過周時而透透之後亦僅二三日而自愈矣今之痧也則不然有二三日而方透者有四五日而終未透者或身肢雖達而頭面不透咳聲不揚喘逆氣粗悶伏危殆者又有一現即回旋增喘促狂躁悶亂謂之隱早者更有痧雖外達而焮紅紫滯或目封或眥赤譫語神昏便秘腹痛或便泄無度種種熱盛毒深之象以向來痧疹門方治之無濟仿治痘之法先以紫雪芳透於前繼以犀羚芩連丹地石膏人中黃大劑清涼解毒始得轉重為輕易危為安或有病深藥淺而至於危變者幾同痘瘡有順險逆之別嗟嗟同一痧也何今昔不侔若此耶揆其所以然大率邇年來種痘盛行胎毒未得盡泄藉此痧症以泄其毒者有之抑或近來時厲之氣甚於昔日以致症之險重者有之要在臨此證者無執前人之治因時制宜因證立方圓機活潑勿以痘重痧輕而忽之庶無愧為司命矣辨活人書婦人傷寒之說嘗讀朱肱活人書云婦人傷寒治法與男子不同舉男子調氣女於調血以為大略似補前人之未及然愚謂此說未可一概論也夫長沙張氏醫中之聖也其著傷寒論原為卒病而設故又謂之卒病論卒病者宜捨本而治標故一百一十三方皆男婦共用即熱入血室亦用小柴胡湯婦人之陰陽易亦用燒裩散自有活人書創立婦人治法異於男子之說後人宗之者多矣不思仲聖之方早合氣血為一致今試以藥考之其立法用意自躍如也即如桂枝芍藥固營而閉衛非血藥乎麻黃防風雖謂之發汗本治乳子余疾非血藥乎白虎小柴胡中知母則治腎柴胡則調經皆氣中之血藥也當歸地黃固不必言即白朮人參人皆以為氣劑而本草言能利腰臍間血可知亦為血藥也大抵用之在陽便為氣藥用之在陰便為血藥總之傷寒一證皆為營衛受病耳何必分男先調氣女先調血耶云岐張氏好古王氏皆以朱氏之說為治雜病之常法誠所謂自具慧眼而不為前人所惑者也本仲聖以論傷寒治法由正路也中幅詮疏氣血陰陽尤妙獨開生面斯可謂用古而不泥古者乎今而後讀活人書者當知所擇矣西疇顧業師評唐立三再續攝生雜話命門真火藏於兩腎之中性門真水藏於一心之內人但言命門真火而不參究性門真水何也因真陽之火能生真陰之水故也殊不知性命相生水火不可以一息不交天一所生之水為我生身之始水中能生真火人皆未究況保真陰之水則真陽之火常存而不散若真陰一衰則真陽無附飛揚上越變為邪火能返涸真陰之水豈不危哉火性本燥烈發揚而腎中相火偏職閉藏水性本柔弱蟄藏而心精三合獨主清利則知性以位變水火本無二氣噓氣即有水陽化陰也蒸水即有氣陰化陽也燈因膏而不滅陽依陰也水因火而不冰陰依陽也相需如此可以知其情性矣補心氣益心精而不見效者則知命門火衰腎水不足何也命門之火即心火之根腎水之精即心精之源心無水則孤火上逆腎無火則寒水下凝水弱火炎則肺金受克陽焰飛揚於上焦而生咳喘咯血等病下虛則上盛也火弱水剛則肝木失養濁陰凝結於下焦而生癃閉壅腫精寒等病上虛則下實也水火兩平陰陽斯無偏勝脾之權在腎胃之權在心自下而上水滋土自上而下火生土也脾土屬陰生於相火而健行不息胃土屬陽傳導於大腸而容受無窮總在主納之腎於是土以火生也脾虛則胃滯而不食脾實則胃運而能食總在主出之肺於是氣機流動也故凡治脾胃當以調肺氣交心腎為先人身之痰最能為害勢湧如潮勢衰如汐風寒濕燥隨氣而生體實體虛隨人而致濁則濃清則稀五藏六腑無盛痰之所上下升降無時而定又與正氣不兩立殆猶天地間陰雲瘴霧耳周身氣血無不貫通故古人用針通其外由外及內以和氣血用藥通其里由內及外以和氣血其理一而已矣至於通則不痛痛則不通蓋指本來原通而今塞者言或在內或在外一通則不痛宜十二經絡藏府各隨其處而通之若通別處則痛處未知而他處反為掣動矣補戒急授而驟壅伐戒亟奪而峻利用之不當皆能致害故攻熱失宜熱未去而寒復作寒熱各踞於其所反致溫涼並禁良醫莫措矣攻寒亦然人但知冬不藏精者致病而不知夏不藏精者更甚焉嘗見怯弱之人而當酷暑每雲氣欲悶絕可知中暍而死者直因氣之悶絕也夫人值搖精恆多氣促與當暑之氣悶不甚相遠經曰熱傷氣又曰壯火食氣余故曰夏令之炎威甚於冬令之寒苟不藏精壯者至秋而發為伏暑怯者即中暍而死
