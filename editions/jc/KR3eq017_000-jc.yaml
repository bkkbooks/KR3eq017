front:
  text: 自序粵稽炎暉紀物首垂本草之經云瑞名官肇啟靈蘭之笈宗傳歷代各立家言沠衍迄今尤工搜錄篁南江氏有類案之編東逸羅君有匯粹之選惟淵源之有自斯繼述之多人矧吾吳文獻之邦乃良醫薈萃之域韓門昆季擅盧扁之稱葛氏喬梓紹張劉之學新甫啟東二十子前朝之著述已繁生洲路玉諸公聖代之闡揚亦夥印機草識元儀臨證之慎重讀書記知在涇學業之深沉凡此各自成書出自諸家見地康熙時有過君繹之者裒集眾賢治案合鏤為書名曰吳中醫案此又片善悉錄一藝必庸旁搜博採而成者也夫廣羅成效固以志鄉先輩之典型而各抒論言亦以徵諸君子之詣力況乎精是業者高才不少明其理者卓識自多匿採韜光非乏枕中之秘靈機妙緒詎鮮囊底之珍凡屬蘊藏可勝惋惜僕謹仿吳中醫案之舊帙更輯吳醫匯講之新編奧義顯詞統為求教長篇短節並曰無拘苟步武之克追期當仁之不讓乃荷同志弗靳輝光共表深思互相賞析或疏往訓既發覆而摘微或出心裁尤領新而標異詮玉版之秘要欣符麗澤之占索金匱之真言胥協盞簪之慶勿謂禁方三十獨推思邈得其奇須知肘後四編不惟抱朴窮其蘊縱釀花為蜜未免書癖之譏而集腋成裘堪補藝林之闕乾隆壬子仲秋長洲唐大烈立三氏書於問心草堂
