body:
  text: 卷三孫慶增石芝醫話人之生命天氣最急地味次之二時不呼吸絕天氣而死七日不飲食絕地味而死此其緩急可知也保命當先納天氣以接元氣食地味以納天氣素問曰天食人以五氣地食人以五味人身之否泰與易理相同地天則泰天地則否耳兩竅目兩竅鼻兩竅合為坤象鼻之下人之中也口一竅前陰一竅後陰一竅合為乾象頭至唇不動地道也口至足皆動天道也頭之上天足之下地人身上下合之故能中立逆之則泰順之則否理所當然人自不察耳人身前面可動者陰用陽也後面不動者陽用陰也故曰前抱陽後負陰西洋自鳴鐘以比人身氣血之周流最為切肖水不升為病者調腎之陽陽氣足水氣隨之而升火不降為病者滋心之陰陰氣足火氣隨之而降則知水本陽火本陰坎中陽能引升離中陰能降故也火上浮則右尺虛不獨腎寒尺虛食下行則右尺大不獨腎虛尺大蓋以命門大腸同居於下也氣之性善升而易散育與固養氣之妙法惟靜存守中善養氣者矣血之性善降而易凝和與溫養血之妙法惟運動調中善養血者矣臟病入腑即愈惟咳嗽症入腑即危蓋肺與大腸為表裡胃傷則飲食不進故也經寒絡熱者溫經清絡絡寒經熱者溫絡清經但經直絡橫溫甘通經辛香通絡為別傷於情志和肝開心醒脾解鬱為主然必緩治用輕藥漸可向愈重藥則反傷胃陽元氣不復血氣耗散矣口授丹方無不誇張效驗而又藥物輕賤便於採取故人樂於聽聞不辨病之陰陽表裡淺深虛實漫以試之禍不旋踵者多矣鄉愚之人往往蹈此哀哉看病認不真切則靜坐思之總於望聞問切四者中搜求病機必有得心之處胸中了了用藥方靈若終於疑惑而勉強投方竊恐誤人性命也傅學淵管見芻言春溫夏熱秋涼冬寒時之正也而風實應之凡治感冒取用表散自宜隨時制方若應熱反涼病隨時變施治尤貴圓通至久晴久雨燥濕異宜臨症更宜留心不可概執常例凡外感病挾食者頗多當思食為邪裹散其邪則食自下若雜消導於發散中不專達表胃汁復傷因而陷閉者有之至若風多挾暑濕寒或挾燥火或惱怒或勞倦或房事及肝氣宿瘕諸血症皆外感病之不無有挾者所貴隨症制宜斟酌盡善庶無差誤也凡內傷病損上損下損及中州在氣在血在腑在臟用藥補救宜專任宜的對無論已設或挾有外感最當留心補膩即不可施當以輕劑調停庶不致粗疏誤事其有上損宜治下下損宜治上或砥柱中流或作隔二隔三之治古人具有良法可師不敢多贅病變無常方難執一然無定之中自有一定之法此即中無定體隨時而在之道也蓋離規矩不可以為方圓執規矩亦不可以為方圓每見前人用古師其意而不泥其方或採取其二三或減增其一二得心應手方推能事君臣佐使制方自有定法然品味不可拘泥陸清獻曾論仁義禮智信隨時迭相為用比之醫家之於君臣佐使也有然即如參苓朮草四君子隨症從宜因時取用當亦如十二律之旋相為宮也寒熱溫涼有一定之藥無一定之治入腑入臟或補或攻其氣味與性不可不細按也故有正用亦有反用有獨用又有兼用並有活用借用之不同如用寒可以治熱反用可以入寒獨用寒而熱可除兼用寒而熱可制微行消導大可和中稍借清滋自能表汗隅反焉而取資無盡矣外感內傷為證治兩大關鍵然去其所本無復其所固有兩言可盡之也蓋六淫外襲身中氣血日失和平一切外感有餘之症有須汗吐下和之治皆是去其所本無也若七情受傷腑臟有損身中氣血日就虧耗一切內傷不足之症有須滋填培補之治皆是復其所固有也讀古人書須識其補偏救弊一片苦心互相牴觸即是互相闡發處所貴多讀多看融會貫通由博反約以求理明心得臨症無望洋之苦是已若好為指摘棄瑜錄瑕殊失欽承前哲之道至矜家秘而執成法頭痛醫頭尋方覓藥一切無方之書置之高閣此又孟浪之流不足與語斯道者矣江朝宗核骨踝脛腨踹辯靈樞經脈篇脾足太陰之脈起於大趾之端循趾內側白肉際過核骨後汪訒菴注核骨俗名孤拐骨足跟後兩旁起骨也按張景岳曰核骨即足大趾本節後內側圓骨也滑氏言孤拐骨者非李士材亦宗之當以張李之注為是汪注未確論詳下節上內踝前廉汪注脛兩旁內外曰踝按字彙踝字華上聲俗有從其便者即從旁讀作果音諺云腳果骨當即此字孤拐骨亦即此也汪注以踝為核骨而以脛兩旁為踝夫脛者膝以下至足之總名俗名小腿者是也與俗名大腿之股相配是四肢中分出之四大名目上肢曰膊曰臂下肢曰股曰脛也故皆從月若踝者近足之突骨也故從足若曰踝在脛下則可而謂脛旁即踝未可也上腨內按腨字張景岳類經及汪訒菴類纂李士材知要皆刻從足類纂注先曰踹音短足跟也又曰一作腨音善足肚也此因誤刻從足故其言岐疑無定類經與知要皆注足肚曰踹此注不誤而字之從足者皆誤刻也按從足之踹字考諸字彙字典玉篇皆曰足跟也脈由大指而上內踝已交於脛自此上行則在脛中矣豈有反下入足跟之理哉若入足跟當用下字不當用上字而曰上踹內矣故知其誤刻從足也循脛骨後統繹四節自核骨而上踝自踝而上腨自腨而循脛骨後可知踝在腨之下而脛不在腨之下矣欲明經脈必當明其部位雖分寸不得混淆也唐迎川爛喉丹痧論近來丹痧一症患者甚多患而死者亦復不少世人因方書未及治亦無從措手或云辛散或云涼解或云苦寒泄熱俱師心自用各守專門未嘗探其本源按仲師金匱書陽毒之為病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之之文細繹其義實與此症相類何會心者之絕少耶惟是升麻鱉甲湯蓋以升麻升透厲毒鱉甲泄熱守神當歸和血調營甘草瀉火解毒正內經熱淫於內治以鹹寒佐以甘苦之旨而內有蜀椒雄黃似當加於陰毒方中或因傳寫之訛耳一轉移間則於陽毒陰毒之義尤為貼切而人之用之者亦鮮疑畏矣今如遇此丹痧一證當於經義詳之毋謂古人之未及也不揣愚陋用敢質之同人臟腑受盛辯讀難經四十二難有臟腑之長短輕重廣狹受盛之數余竊以為未必然如人輕重長短不齊飲食多寡不一即可類推也即長短尚有以中指屈曲而取中節之罫角以量之論而受盛水穀之升合迥然各異可見吾儕看書要在圓通活潑未可拘泥成說也大溫中飲炙甘草湯合論閱景岳新方中於大溫中飲方下有從補血而散而云騰致雨之妙則仲景猶所未及句竊謂傷寒方中仲師用炙甘草湯有桂酒地麥膠麻之品非陽根於陰汗化於液云騰致雨之妙乎未可謂其未及也論柴胡按柴胡為少陽藥者因傷寒少陽證之用柴胡湯也夫邪入少陽將有表邪漸解里邪漸著之勢方以柴芩對峙解表清裡的為少陽和解之法而柴胡實未印定少陽藥也蓋以柴胡之性苦平微寒味薄氣升與少陽半表之邪適合其用耳乃有病在太陽服之太早則引賊入門若病入陰經復服柴胡則重虛其表之說此恐後人誤以半表半裡之品為認病未清者模糊混用故設此二端以曉之也不觀之景岳新方中諸柴胡飲柴芩煎柴胡白虎煎諸方信手拈用頭頭是道是誠知柴胡之用而先得我心之所同然矣再古方中有逍遙散之疏解鬱熱歸柴飲之和營散邪補中益氣湯之升發清陽提邪下陷疏肝益腎湯之疏肝清熱養陰透邪其妙難於僕數何至重虛其表乎余於風邪初感之輕症及邪氣淹留表熱不解之久病用之並臻神效奈何將此有用之良品拘泥成說而畏之即用亦准之以分數竟至相沿成習不得不為置辯論犀角升麻按朱南陽有如無犀角以升麻代之之說以其同於一透也朱二允以此二味升降懸殊為辯余謂尚非確論夫犀角乃清透之品升麻乃升透之味一重於清一重於升其性不同其用自異未嘗聞有異而可代者也若夫風寒壅遏疹點未透者斯為升麻之任而溫邪為病丹斑隱現者又系犀角之司如以升麻為代其肺氣熱者必致喉痛甚增喘逆營分熱者必致吐血輕亦衄宣其誤若此豈可代乎又角生於首故用為透劑二允以為下降之品亦不可不辯余非敢輕議前輩實出婆心之不禁耳故謹論之辨紫茸之偽痘科所用紫茸即紫草之嫩苗也活幼新書云紫草性寒小兒脾實者可用脾虛者反能作瀉古方惟用茸取其初得陽氣以類觸類用發痘瘡今人於前四朝涼血利竅則用紫草若痘局布齊後改用紫茸以血熱未清於涼血中兼寓升發之義也今肆中所用色紫而形如松膏者乃系洋內樹脂與紫草茸迥異醫俱不察而用之不可不急為之辨辨鬱金之誤鬱金一物出於川產野者色黑不可多得其川中所種者皆系外白內黃即今人誤呼為薑黃子者也至肆中所用川鬱金乃莪朮中揀出莪朮之子因其色黑與川中野鬱金相似而混之也醫俱不究反以川中種本之黃鬱金謂廣鬱金或謂薑黃子殊堪捧腹余於弱冠時入川即曾深究此品當以種本之外白內黃者為是勿泥薑黃子之說而廢之周思哲大豆黃卷辯大豆黃卷古人罕用本草載其性曰治濕痹筋攣膝痛五臟不足益氣宜胃破婦人惡血除胃中積熱消水氣脹滿即金匱虛勞門薯蕷丸於氣血並補方中佐之後之著方解者有宣發腎氣之論亦未謂其發表也近來誤作表藥者其故何歟蓋因吾吳人喜服輕方而昔之治病俱於醫家取藥有云馬元儀先生預用麻黃湯浸豆發糵凡遇應用麻黃者方開豆卷俾病家無所疑懼渠得藥投中病曲以兩全此心亦良苦矣後醫不明細底竟認豆卷與豆豉同類公然影射作為表劑但肆中豆卷豈亦有麻黃湯浸發者乎即以格致之理論之豆得水而發糵或能些微宣濕亦不能為通用表藥也若用二三錢之豆卷即可表汗世人以此為蔬菜者每食盈簋何不汗至亡陽耶一笑蔣星墀瘟疫贅言春溫夏熱秋燥冬寒固病之常若夫疫者穢惡之氣互相傳染吳又可論之詳矣惟吳氏謂從口鼻而入即踞膜原愚謂既由口鼻吸受肺為出入之門戶無有不先犯肺者疫皆熱毒肺金所畏每見此症之身熱先有憎寒肺先病也繼而充斥三焦或有徑入心胞者所云厲氣無非鬱熱是以喻西昌所講瘟溫二字未嘗區別蓋亦有見乎此耳況所云上焦如霧升逐解毒中焦如漚疏逐解毒下焦如瀆決逐解毒總不脫一毒字者其為鬱熱意在言表矣更有患此病者縱飲冷水亦能大汗而解此非熱毒之明驗乎至於疫邪雖解而肺蓄餘熱每多咳嗆肌熱自汗等證亦所謂肺先受病而未愈之明徵也又有大旱之年水涸日烈河水每多熱毒飲其水者多發疫痢以痢門常法治之無效余於治痢方中加以貫眾之苦寒解毒無不應手取效此亦熱毒之一驗也合併志之合論丹溪景岳相火大意丹溪論陽有餘陰不足所謂陽者相火也景岳駁之謂陰有餘陽不足而著相火以位之辨各樹旗幟幾如冰炭之不相入矣嘗舉二者參之丹溪大旨本於周子主靜立說謂相火一動則五志厥陽之火併煽煎熬真陰故東垣目為元氣之賊此論相火二字專從後天之變動者言與景岳之主命門有源流之別夫天非此火不能生物人非此火不能有生考前哲如褚氏趙氏人生先具命門及相火行陽二十五度之語參之景岳所云相得益彰蓋靜而守位者此相火靜則溫養動而無方者亦此相火動則燔灼譬之天與日太陽之火也雖烈而不能焚物以陽燧取之不過星星之火其用即可燎原故景岳之說日也失其所則折壽而不彰丹溪之說日而火也飛走狂越莫能御之今將指日為火固失之而指火為日亦豈云得乎陰陽應象大論壯火之氣衰少火之氣壯壯與少之別即兩家宗旨所分故必合兩家所論義始完備若偏執一說於道失之升降出入說素問六微旨大論出入廢則神機化滅升降息則氣立孤危嘗謂傷寒所論傳經即是出入精義蓋正氣之出入由厥陰而少陰而太陰而少陽陽明以至太陽循環往復六淫之邪則從太陽入一步反歸一步至厥陰而極此邪氣進而正氣退行不復與外氣相通令韶張氏謂之逆傳養葵趙氏謂之郁證即此義也故開闔樞三者乃其要旨夫分言之為出入為升降合言之總不外乎一氣而已矣觀東垣脾胃論浮沉補瀉之圖以卯酉為道路而歸重於蒼天之氣考其所訂諸方用升柴苓澤等法實即發源於長沙論中葛根柴胡五苓之意以引而伸之所謂升之九天之上降之九地之下雖內傷外感殊科而於氣之升降出入則總無以異耳王氏曰凡竅橫者皆有出入往來之氣竅豎者皆有陰陽升降之氣蓋人在氣中如魚在水中人不見氣如魚不見水上下九竅外而八萬四千毛孔皆其門戶也氣為之充周而布𮑮雖有大風苛毒莫之能害是故邪之所湊其氣必虛內陷者有入而無出下陷者有降而無升此升降出入四字為一生之橐籥百病之綱領寸口趺陽緊脈不同論詳考傷寒論中寸口之緊與趺陽之緊雖同曰緊而義自各別蓋緊見於寸口是客邪所致之病脈緊見於趺陽趺陽是胃之本脈平脈篇云跌陽脈微而緊緊則為寒又云跌陽脈沉而數沉為實數消穀緊者病難治夫緊則為寒數則為熱既曰數又曰緊不幾寒熱混淆歟盧予繇疏云緊則為寒為其嫌於無陽蓋此寒字非寒邪之寒針對陽字而言乃是形容無陽意思無陽者無胃脘之陽也即所云知陰常在絕不見陽意知陰常在絕不見陽以尺脈言是腎陽此以趺陽言是胃陽人以胃氣為本故診趺陽須知遲緩診寸口當求濡弱皆胃陽敷布之象即經文無胃氣曰死之要旨耳至於寸口脈浮而緊寸口脈陰陽俱緊此緊字以寒邪言細參之要自有濡弱者在所謂濡弱何以反適十一頭為五臟六腑之主脈之骨也不得與跌陽之緊混同而論中腑中臟辨病機機要云中腑者宜汗之中臟者宜下之此腑臟二字實是指經絡言腑無汗法入臟亦豈有下法五臟者藏精氣而不寫故滿而不能實六腑者傳化物而不藏故實而不能滿此臟宜補腑宜通之要旨也考長沙三百九十七法邪歸中土乃可議下其少陰急下三條指轉入陽明腑證者言仍是土鬱奪之之義如已臟真失守而復瀉之是虛虛也古於汗下之法禁例綦嚴豈宜如是之倒行逆施乎觀其論中腑曰脈浮惡風寒則明是中經論中臟曰大便秘結則明是中腑辨名正誤庶於立言之旨有合云
