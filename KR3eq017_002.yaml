body:
  text: 卷二薛生白日講雜記在易先天圖在上在南後天圖在下在西北與內經之旨正合體用互呈生成供著人身一小天地豈不信哉繫辭釋先天圓圖云數往者順知來者逆數往者順即後天之用五行相生之謂內經人壽可得百年之説也知來者逆即反五行之相剋者為相生軒岐治病之祕旨也從後天圖經逆到先天圖位便是金丹大道攢簇五行作用余嘗言人須到得半個神仙身分方當得起名醫二字實非浪語凡大疫之年多有難識之症醫者絶無把握方藥雜投夭枉不少要得其總訣當就三年中司天在泉推氣候之相乖者在何處再合本年之司天在泉求之以此用藥雖不中不遠矣讀素問耳兼心腎與靈樞合看則又兼肺可見每竅皆兼五行如天地之互相入者喻江西才宏筆肆專以大言欺人惟論溫則自呈敗缺不少人不知其牽混也溫瘟二症絶無界限使後學亦往往混讀而不甚分明余故於此三致意焉長沙夫子用阿膠何曾云炒後人畫蛇添足耳阿膠之用專為濟水伏流也炒之濟水何在哉傷寒脈浮滑此表有熱里有寒表之熱寒之用里之寒熱之體言熱病本於寒寒既病而為熱矣則體用皆熱也漢之文法如此婦人手少陰脈動甚者妊子也陰搏陽別謂之有子手少陰脈盛是宜妊子之象及笄之子亦有之者過此不得亢極為病比比然也若陰搏陽別已有子也一句虛看一句實看方是女子尺脈常盛寸脈常虛此言陽別者猶云與平日之脈有別至是而寸脈亦覺洪滑故云少陰脈動甚者妊子也內經夢事雖分臟腑陰陽大要總繫心肝兩臟為主何也未有神魂靜而夢寐顛倒者也唐立三金匱上工治未病一節辨此節諸家注釋皆隨文敷衍惟尤在徑以酸入肝以下十五句謂疑非仲景原文後人謬添注腳編書者誤收之也細按語意見肝之病以下是答上工治未病之辭補用酸三句乃別出肝虛正治之法觀下文肝虛則用此法實則不在用之意可見矣烈謂在涇所云注腳之説可稱千古隻眼惟是此節專為治未病而設補用酸三句非皆肝虛之治兼出實脾之法蓋言肝若虛者用酸補之若實者用焦苦補火以助土甘味直益其土也酸入肝三句與上三句針對尚可為上三句申明其義可毋謂之謬注脾能傷腎以下十二句無論補脾以傷腎縱火以爍金然後使肝無伐獲益者少受傷者反多已屬不經且於治法亦隔四臟迂回極矣更脾得補而生肺金來剋木僅隔二臟脾土勝而剋水少於涵木亦隔二臟忘其近者而以迂遠之説強為穿鑿謬注顯然況凡臟病惟虛者受之而實者不受臟邪惟實者能傳而虛者不傳故治肝虛者直補其肝以御外侮治肝實者先實脾土以防滋蔓此正治也肝虛則用此法實則不在用之二句愚見亦以為謬注刪此十四句則下文虛虛實實等句一氣貫穿矣辨金匱䅽飥之訛金匱第十三節清邪居上濁邪居下大邪中表小邪中里之下魏柏鄉諸本作䅽飪之邪徐忠可諸本作䅽飥之邪醫以䅽字讀作谷字者居多以致金匱心典竟作谷飥之邪矣蓋因梅誕生字彙無此䅽字而飥字注云麵裹屬故誤以谷字配之而為難化之物也考康熙字典䅽字注云讀與䅽同即以金匱䅽飪之邪句實之按飪為烹調生熟之節則此句當作馨香可口過食之而停滯應讀䅽音馨飪為是以䅽讀谷以飪作飥及竟作谷飥者皆非也二陽之病發心脾解二陽者足陽明胃手陽明大腸也其病發於心脾蓋因思為脾志而實本於心其始也有不得於隱曲之事於是思則氣結鬱而為火以致心營暗耗既不能下交於腎脾土鬱結又轉而克腎是以男豫少精女子不月無非腎燥而血液乾枯也且夫脾有鬱火則表裡相傳胃津亦涸大腸為胃之傳道故並大腸而亦病也此二陽之病當以燥火之證言在胃則為消為格在腸則為閉為鞭至於胃腑既燥而脾無以行其津液則為風消風消者火甚而生風脾憊而肌肉消削也大腸之燥傳入於肺則為息奔息奔者息有音而上奔不下也四臟二腑交相燔灼陰液盡耗故直斷為死不治昔王安道以腸胃有病延及心脾顛倒其説於不得隱曲之故闕而未洋喻嘉言闡發稍明亦但言其所當然而未窮其所以然故更詳之維脈為病論治二十九難曰陽維為病苦寒熱陰維為病苦心痛越人但有是説而無治法後人以桂枝湯為治可謂中肯蓋陽維維於陽屬於衛也故為寒熱陰維維於陰屬於營也故為心痛桂枝湯有和營衛調陰陽之力適合比例以治也張劉李朱後當以薛張吳喻配為八大家論自有軒岐越人以來著書立説者不下數百家而久推張劉李朱為四大家者蓋以仲景首論傷寒立法立方實為醫祖守真復以春溫夏熱立言補仲景之未備東垣詳辨脾胃內傷與外感懸殊又補張劉之未備丹溪又專論補陰再補東垣之未備各有見地迭為補閥已有李士材論之曉暢矣而余謂言外感者張劉言內傷者李朱似乎備矣而實有未盡明之薛立齋謂十三科一理慨外科固執成方不窮病本特發內外合一之論又以風會不齊今人虛薄痛戒寒涼多行溫補此又補丹溪之未備而擴人胸臆者由是張景嶽李士材輩著述頗行實皆立齋之餘韻也雖然內傷諸症脾胃獨詳於李氏陰陽分擅於朱薛可謂無遺蘊矣而外感風寒溫熱之外尚有夏月直受暑邪者雖潔古東垣輩以動靜分陰陽似屬近理自有張鳳逵申明傷暑之理蘊特著全書可云見老復有喻嘉言不獨從仲景書中悟出冬溫春溫伏氣為病於千百年無人道破之書一旦揭其微義誠為暗中一大炬更悟出秋燥一門指破內經秋傷於濕之誤可稱千古隻眼至此而天之六氣方云大備更有不關六氣而亦屬外受之疫邪諸書中雖亦有所闡發而莫如吳又可直窮變態反覆詳明此又於講求外感諸家補其未備者也其外載籍充棟縱各有可採之論可傳之方無論醇於此者疵於彼難稱完壁即有腹筒廣博卷帙充盈者要不及薛張吳喻四先生各開生面以補張劉李朱之闕也讀其書不敢沒其功故特以八大家推之醫宜博覽論病有常變治亦有常變無不備載於書中固在乎人之善於取裁也然而世人之病不獨變端莫測談非容易更有證出希奇人難習見當此時也將束手而待斃那抑漫然而嘗試耶載籍極博奇妙不少試舉一二言之辛亥春元墓墳丁沈長觀大腸頭忽出寸許痛苦難忍干則退落又出又落二十日余如是者三次就治於外科始有稱為肛癰者繼則莫能治之一日赴城中王士林家求治士林曰此名截腸病出於夏子益怪疾奇方此時尚可治之再出再落則不可救矣令以臀坐浸於芝麻油內再日飲麻於汁數盞不數日而愈夫夏子益書今已無傳不過散見於本草綱目王子留心及此其博記可知又巳亥歲春有泰興縣人纓志文被訟管押驟然周身發泡流水皮㿹毫無空隙即行斃命尸屬具控奉撫臬各憲調發蘇州府審辦郡侯楊公轉行府醫學翁公查議是否毒發有無此瘡翁公以系內科請飭外科查覆闔郡外科皆無以對翁公偶過寒齋談及此事余曰曾見彭用光普濟良方載有虜瘡云建武中南陽擊虜所得與此證情形悉合須以蜜煎升麻拭摩若不即療數日必死等語綱目蜂蜜注中亦有是説翁即借去此書並即申明於內科醫生唐立三家借得簽呈詳覆而定案於是縣差之罪得雪設使是時苟無此書幾成冤獄矣又庚戍冬南營高姓女兩足指忽青黑紫爛不知痛癢漸延至跗脛踝間請治於外科多人有云脫疽者有云落腳傷寒者並有推為冤業症者咸稱不治及邀葑門陸鳳翼視之云此不成為病止服溫通氣血之劑外用臘槽煎洗不數日可愈果如其言衆皆異之余於附近視症聞之亦異後遇陸子詢其故答曰診其脈惟稍澀余無病象並問其素常裹足過緊因知此症不過血脈受寒冰凝不運於是肌肉潰爛耳此乃切問精詳又不張大顯功殊可欽也又丙午春有海門人王潮患病延醫張勝林用桂附等藥病已漸輕換醫陳若山因王潮面帶赤色身不惡寒用犀角等味涼藥越日即死其父王德甫毆傷陳若山身死奉臬憲常公提至省城審辦因余有府醫學之任下余辨議余以傷寒論少陰病裡寒外熱身反不惡寒其人面色赤通脈四逆湯主之一條與此案前醫所用之藥相符又景嶽寒熱真假篇云凡真熱本發熱而假熱亦發熱其病亦為面赤躁煩等證昧者見之便認為熱妄投寒涼下咽必斃等語又與服犀角等藥越日即死相符其為陳若山誤治而死無疑詳覆定案於是王德甫痛於毆醫罪得輕減又巳酉歲表甥陸灌園患瘧半年大肉盡削後變黃疽繼而兩膝腫痛大如鶴膝兩股腑腨皆青黑痛甚而冰冷又上下牙齦紅腫形如榴子色若塗殊日漸潰爛滿口熱如火烙舌亦紅紫而痛湯粥難下病勢可危遍請外科圖治皆云下部陰寒上焦火亢殊為棘手余索不諳外科亦同聲無措一日延山塘劉玉如來云此一症也名曰青腿牙疳載於御纂醫宗金鑑如方調治而愈夫醫宗金鑑人所應讀之書也延過外科數位無人或識惟劉於知之多見其有學也即此五病失治則死得治則生一死一生出乎醫手由是觀之書可不覽哉覽可不博哉司人性命者豈僅粗知經絡藥性脈訣湯頭遂可云勝任哉讀傷寒補天石貫珠集二書合記傷寒一症頭緒繁多自仲景立法立方以來叔和編次無已注釋理蘊為之一顯逮後續為注釋者不下數十家互相訾低殆無底止余謂數十家中吳蒙齋之指掌固為捷徑雖李士材亦以為善然而奧義深微末由參究方中行起而條辨洵為卓識程郊倩拾其唾餘徒滋浮衍柯韻伯立言雖暢不免穿鑿至如張路玉周禹載諸君詮發各極精詳又或嫌其叢蔓獨有喻氏之書膾炙人口者以其繁簡得宜通乎衆耳然以尤在涇先生貫珠集較之則又徑庭矣即如首篇云寒之淺者僅傷於衛風而甚者並及於營衛之實者風亦難泄衛而虛者寒猶不固但當分病症之有汗無汗以嚴麻黃桂枝之辨不必執營衛之孰虛孰實以證傷寒中風之殊立為正治法權變法斡旋法救逆法類病法明辨法雜治法等仲景著書之旨如雪亮月明令人一目瞭然古來未有何其金匱心典梓行於世並採入御纂醫宗金鑑而貫珠集一書尚未傳播良可惜哉至於變通其法而云今昔異宜者如陶節庵高鼓峰輩雖亦代有傳書而莫如戈存橘之補天石為最舉凡四時感症無論正傷寒類傷寒分條辨治各極其妙可謂博而詳詳而約矣其書板廢之後莫之再鏤者余實不得其解欲將戈尤二君之書合鐫行世一則由證以立法一則由法以辨證相為經緯瞭如指掌竊以為凡屬感症止須讀此二書思過半矣無如力不從心因循未鏤今老矣有志而不逮矣愛紀數語以俟諸同學或有意見相同者否妊娠陰脈小弱論內經言手少陰脈動甚謂之有子陰搏陽別謂之有子曰動曰搏皆有力之象也而金匱復以陰脈小弱其人渴不能食無寒熱者為妊娠二説何其相反耶蓋內經所云者一謂手中之少陰腎脈血聚氣盛故脈動一謂陰得胎氣而強故陰脈搏指而陽脈反與之有別此皆於三月之胎診之始驗其金匱所云者謂下焦之氣血驟為胎蝕暫似有虧故脈小弱此惟於兩月左右驗之過此則不然矣是以下文有於法六十日當有此證句由是觀之二書似反而實同也然更以千金所云初時寸微小呼吸五至三月而尺數之語合而參之斯得圓通之妙焉讀書十則有小序嘗讀喻西昌書有曰邇來習醫者衆醫學愈荒無方之書全不考究有方之書奉為靈寶云云可知吾儕之學問全在乎無方之書為根本也然而典墳具在蘊奧良多何以考之何以究之哉聊紀數則以為引伸之鑑讀書須看反面丹溪曰方書瘦胎飲一論為湖陽公主作也豫族妹苦於難産豫甚憫焉視其形肥而勤於針黹構思旬日忽自悟曰此正與湖陽公主相反彼奉養之人其氣必實耗其氣使和平故易産今形肥知其氣虛久坐知其不運今其有孕至五六月遂於大全方紫蘇飲加補氣藥與十數貼因得男兒甚快烈按同一難産而有虛實之別補氣之方反從瘦胎飲悟出故凡前賢議論必明其正義又必於反面構思方不為其所囿可見讀書不可獨泥於正面也讀書須悟對面趙養葵五行論曰世人皆曰金生水而豫獨曰水生金夫肺出氣也腎納氣也凡氣從臍下逆奔而上者此腎虛不能納氣歸元也毋徒從事於肺或壯水之主益火之源肺向水中生矣烈按水生金乃金生水之對面也世人但知其一面而不知又有彼一面凡此之類自在人善悟之耳讀書須識正旨素問通評虛實論曰帝曰腸澼便血何如岐伯曰身熱則死寒則生吳鶴皋注云身熱則血敗而孤陽獨存故死烈按腸澼便血之身熱有三一則表邪下陷於陽明藥中加葛根胃氣得升即愈一則陰盛格陽雖為危候亦有用溫藥而得生者惟陰氣已竭之身熱於法不治吳鶴皋但注得孤陽獨存可知陽陷與格陽不在此例也苟使泥於吳注幾疑此症惟有孤陽獨存矣並疑凡身熱者皆死矣故曰讀書須識正旨讀書必須匯參李念莪腫脹論引內經實脹四條虛脹二條寒脹三條熱脹一條又五運六氣各有腫脹然有提其綱者曰諸濕腫滿皆屬於脾又曰其本在腎其末在肺皆聚水也又曰腎者胃之關也關門不利故聚水而從其類也可見諸經皆有腫脹無不由於脾肺腎三者烈按今醫之各有所偏者因看書時不能參考異同以致囿於一説遂為成見張路玉醫通凡例曰從古立言止就一端而論誠哉是言也故引此以為讀書必須匯參之法讀書須立主見景嶽全書關格門歷引經文而曰關格一證內經本言脈體以明陰陽離絶之危證又歷辨越人以上魚為溢為外關內格入尺為覆為內關外格及仲景叔和東垣等以在尺為關在寸為格關則不得小便格則吐逆之非而獨創論曰人迎察六腑之陽寸口察五臟之陰人迎盛至四倍以上此孤陽獨見故曰格陽格陽者陰格於陽也氣口盛至四倍以上此元陰無主故曰關陰關陰者陽關於陰也若人迎寸口俱盛至四倍以上且大且數此陰陽相離故名關格也總由傷腎傷精陽不守舍雖與勞損症不同實即勞損之別名也烈按關格二字諸先哲久已相傳為下關上格矣一旦獨闢為陰陽離絶之脈證不囿於相傳舊説觀此可以開我儕自立主見之一助讀書必須隅反王損菴曰內經言溫瘧在臟者止以風寒中於腎言疸瘧者止以肺素有熱然冬令之寒既得以中於腎則其餘令氣之邪又寧無入客於所屬之臟者既肺本氣之熱為瘧則四臟之氣鬱而為熱者又寧不似肺之為瘧乎此殆舉一可以三隅反也烈按內經止説得冬令之寒而損菴即於冬令推到春夏秋令氣之邪內經止説得肺素有熱而損菴即於肺臟推到心肝脾腎可見讀書貴乎隅反不可固執一説也讀書須善比例喻嘉言治金鑑一案曰觀其陽症陰症混在一區與兩感傷寒無異仲景不立治法然曰發表攻裡本自不同又曰活法在人神而明之未嘗教人執定勿藥也於是以麻黃附子細辛湯兩解其在表陰陽之邪附子瀉心湯兩解其在裡陰陽之邪而愈烈按春溫之症本無兩感嘉言以其病情同於兩感而即以仲景之方比例治之真所謂活法在人神而明之也今人奇疾甚多治法宜從權變故引此以為比例之法讀書須剔錯處王安道內傷余議曰東垣內外傷辨有曰飲食勞倦傷而內熱者乃陰火乘其坤土也又曰勞者溫之損者溫之惟宜溫藥以補元氣而瀉火邪內經曰溫能除大熱耳按陰火二字靈素難經未嘗言而東垣每每言之又勞者溫之所以調其飲食適其起居澄心息慮以待其真氣之復常也禮記所謂柔色以溫之正與此同今東垣謂宜溫藥補元氣而瀉火邪又易損者益之為損者溫之又以溫能除大熱為內經所云而遍考內經並無此語此亦不能無疑者也烈按東垣乃醫賢中翹楚尚有舛惜內經之處況其他書哉讀書者豈可苟焉從事哉故引此以為一鑑讀書須汰衍説張會卿曰瘧疾一證內經言已詳盡後世議論煩多反資疑二茲舉陳氏三因之説以見其概如內因五臟之瘧在內經所言不過為邪在何經之辨原非謂七情所傷也再若不內外因或以瘧邪亂神因致狂言似鬼者有之豈鬼祟果能為瘧乎至若胃瘧既云飲食明是內傷且凡先因於瘧而後滯於食者有之未有不因乎外邪而單有食瘧者也陳氏之説既以三因立論故不得不敷衍其説不知響影之談不但無益而且亂人意見烈按此類之衍説甚多如士材之診家正眼每脈中必以寸關尺為主病甚至將遲數之脈亦復分之而云寸遲上寒關遲中寒尺遲火衰夫三部之脈數則俱數遲則俱遲如何提出一部之獨遲獨數以為主病乎此亦景嶽所謂敷衍其説也諸如此類不可為其所惑讀書須辨訛字喻嘉言秋燥論曰生氣通天論謂秋傷乾燥誤傳傷燥為傷濕解者竟指燥病為濕病遂至經旨不明烈按此一字之訛而有毫釐千里之謬諸書中傳寫訛字頗多讀書者自須具眼
