body:
  text: 卷九徐叶壎四大家辯李士材讀四大家論一篇本自王節齋大意謂三子補仲景之未備而與仲景並峙也然仲景醫中神聖德備四時三子則伯夷伊尹柳下惠而已試觀玉函金匱方中黃芩白虎已開河間之先也建中理中已開東垣之先也復脈黃連阿膠已開丹溪之先也然則謂三於得仲景之一德而引伸條暢之則可謂三子補仲景之未備則未確也論醫宗必讀明季李士材先生我城人也所著醫宗必讀一書固已膾炙人口矣然余竊有議焉夫必讀者軒岐之書也越人仲景之書也下此而脈經千金外臺以及近代諸名家書雖不能盡讀或取其十之六七或取其十之三四不可不讀矣苟守張長沙博聞強識之訓以探本窮源則是書又為淺醫畫限之書矣改其名曰不必讀其庶幾乎論讀景岳書不可專得其溫補之益竊觀富貴之家投寒涼則忌進溫補則合醫之喜用溫補者遂有景岳派之名殊不思景岳亦溫涼補瀉並收之書也觀其論症先述古而補以已見分劑先古方而補以新方作者以全書名之讀者以全書貫之舍其短而錄其長則上而溯諸河間易水金華諸家無不合也更上而溯諸南陽醫聖亦無不合也而得景岳之益者豈特在左歸右歸而已哉王繩休攷正古方權量說古方自靈素至十金外臺所集漢晉宋齊諸名方凡云一兩者以今之七分六釐准之凡云一升者以今之六勺七抄准之謹考定如左凡古方權量皆趙於律黃帝律尺九寸夏尺則加一寸而為十寸今木工之曲尺是也唐孫真人千金方論述針穴分寸云其尺用夏家古尺司馬法六尺為步今江淮吳越所用八寸小尺是也據此知即今曲尺無疑知此尺即黃帝律尺寸者以藥升之龠積與尺度考得之詳見律學淨聞以曲尺之寸度作方徑一寸六分上下相等深七分八釐強共積二千分即古藥升之容積千金論藥升方作上徑一寸下徑六分深八分當作上下徑一寸六分深八分弱按管子云釜鏂不得為侈弇且計其容積僅五百廿二分不應如此之小故知傳寫之誤也升口自乘得二百五十六分以深七分八釐強乘之得二千分為容積云深八分者舉成數言之也藥升一升容黃鐘兩龠之實以秠黍二百四十粒為一兩但秠黍之重今無可考依千金論蜜一斤得藥升七合及靈臺儀象志水與蜜同積異重之比例若二十與廿九而次第以准測之古一兩今七分六釐也古律龠容一千二百八十秠黍千金論一撮者四刀圭也六十四黍為圭半之為一刀圭十撮為一勺勺即龠也兩勺為一合合為升字之誤一升共二千五百六十黍也李時珍沿兩勺為一合之誤更增十合為一升則誤以傳誤矣幸千金及外臺原文俱無此五字可證秠黍一稃二米用以量龠取基圓滑而齊見考工記輪人條下注疏中自劉歆變亂古法置秠用秬前明鄭世於特覓秬黍權以今平每龠一千二百粒重三錢未足為訓也鄭世子樂書穿鑿附會其云黍權黍量盡屬臆斷張介賓採入類經圖翼殊誤後人也知二百四十黍為一兩者千金云十黍為一銖圖翼謂十黍當作百黍者非也六銖為一分四分為一兩十六兩為一斤此則神農之秤也考正古權之法先作藥升滿曲尺二千分中容井水秤重一兩二錢而推得其同積異重之比例假如水與蜜各貯一盞中容積相等而水輕蜜重水若二十兩則蜜必二十九兩以此推算一藥升之水重一兩二錢者則一藥升之蜜必一兩七錢四分明矣以三率明之水二十蜜二十九水一兩二錢相乘得數三十四兩八錢以第一率之二十為法除之得第四次一兩七錢四分蜜一兩七錢四分既得蜜一藥升之重以三率重測之如法乘除得蜜七合之重藥升一升蜜今重一兩七錢四分藥升七合蜜今重一兩二錢一分八釐夫此七合之蜜今重一兩二錢一分八釐者即古蜜十六兩之數也依上法重測之得古一兩今若干之數古十六兩今重一兩二錢一分八釐古一兩今重七分六釐強以古方參之麻黃湯麻黃三兩准今二錢三分分三服中病即止每服止七分六釐小柴胡湯柴胡八兩准今六錢分三服每服止二錢承氣湯大黃四兩准今三錢分再服中病即止每服止一錢半白虎湯石膏一斤准今一兩二錢分三服每服止四錢藥升之容積二千分以今倉斛之積寸推之古一升今六勺七抄也立方算法滿千分為一寸曾以倉斛計之合曲尺之寸度積一千四百九十七寸為今五斗則知曲尺二寸為六勺七抄以古方參之半夏秫米湯半夏五合准今三勺三抄半秫米一升准今六勺七抄甘瀾水五升准今三合三勺煎取升半准今一合分三次每服飲一小杯杯如杯飲約可手掬今比此尤小故曰小杯四逆散每服方寸匕准今一錢其泄利下重者加薤白一升煎服末藥少而一升之薤其少亦可知方寸匕者作匕正方一寸依曲尺之寸度為之錢匕者以五銖錢為之開元錢亦同皆抄散取不落為度古人用散藥以刀圭抄取之匕亦刀圭之意也准前論一刀圭為三十二黍方寸匕者十刀圭也立方一寸積千分三除之得三百三十三分為方一寸匕之實容三百二十黍准今一錢藥性輕重不等今但就黍計之以得其大概千金論錢匕者以大錢上全抄之若云半錢匕者則是一錢抄取半邊耳井用五銖錢也錢五匕者今五銖錢邊五字者以抄之亦令不落為度按五銖錢與開元錢徑相同准曲尺九分其冪六十三分以九分乘之得五百六十七分三除之得一百八十九分為一錢匕之實乃以三百三十三分為首率重一錢為次率一百八十九分為三率得重五分六釐為四率是一錢匕之重也半錢匕者准今二分八釐錢五匕者准今一分四釐也以古方參之五苓散四逆散等方每服方寸匕准今一錢桃花湯赤石脂末半斤每服方寸匕日三服每方寸匕准今之二錢石藥性重也燒褌散每服方寸匕日三服灰性必輕大陷胸湯甘遂一錢匕分二服每服是半錢匕准今二分八釐十棗湯強人服一錢匕准今五分六釐文蛤散一錢匕藥性較輕一撮者以三指為度千金論一撮者四刀圭也得一百二十八黍准今四分以古方參之澤術糜銜散藥共二十五分准今四錢七分五釐以三指撮為後飯每服四分日三服三日後病瘳而藥將盡矣風引湯藥共五十五兩准今四兩一錢八分取三指撮井水煮服石藥性重每服八分以五十餘日為度凡丸藥如梧子大者准藥末一分如彈丸及雞子黃者准藥末一錢千金論刀圭者十分方寸匕之一准如梧桐子大也一方寸匕散以蜜和得如梧桐子十丸為定如彈丸及雞子黃者以十梧桐子准之准前論刀圭容三十二黍應重一分方寸匕加十倍應重一錢以古方參之己椒藶黃丸藥共四兩准今三錢蜜丸如梧子大飲服一丸日三服每日三丸每丸一分蜜在外十日而瘳可知也薯蕷丸藥共百七十八分准今三兩三錢八分大棗百枚為膏和蜜丸如彈子大空腹酒服一丸一百丸為劑每丸藥末當重三分四釐因有大棗一枚及蜜故得如彈子大也彈子大者或較小於雞子黃然亦不甚相遠耳理中丸藥共十二兩准今九錢一分蜜和丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四服夜二服腹中未熱益至三四丸每丸藥末一錢當得九丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服作湯者即用此九錢一分之藥煎之也寇宗奭疑丸藥少湯藥多妄謂古方如雞子黃者應是大丸李時珍宗之遂於古法如彈丸及雞子黃准十梧子者奮筆增為四十梧子謬也備急丸每服大豆許三四丸未差更與三丸按千金十六黍為一大豆合七丸計之不過百十二黍之重准今三分半凡藥有云大升大兩者以神農秤三兩為一兩藥升三升為一升千金論隋人以三兩為一兩權三倍故量亦三倍以古方參之外臺載廣濟方蒜煎主冷氣用牛乳五升准今三合四勺納剝淨蒜肉二升煎候蒜消盡下牛膝一大斤末准今三兩六錢煎成酒和兩匙服之乳經煎蒜後約存二合配三兩六錢煎而調和之其末必不可復多矣外臺載錄驗方杏仁煎療咳氣杏人一升搗以水和研取三大升汁准藥升九升煎取一大升酒服一匙日三以水九升研杏仁一升其水亦不可復多矣凡煮湯大略古藥二十兩今一兩五錢用水一斗今七合煮取四升今二合八勺勺二三次服之上藥皆㕮咀如豆大必水乘氣熱方始透入藥中既而藥乘水沸乃始溢出汁間然且火欲其微沸欲其小絞以兩人助以尺木澄去垽濁而後服之全欲得其氣之清而不欲多水以耗其氣讀千金論自明至於千金論諸藥權量互求之法往往不合則古今藥性不同故也即如蜀椒吳茱萸地膚子蛇床子古取陰乾今皆曬爆爆則藥性為之輕輕則各有差等而權與量不相合矣又如附子以一枚准半兩古取其土中自養形癯神足者棗有大小以三枚准一兩古以八月採爆干尚皮不尚肉別錄云棗皮利肉補虛惟十棗湯取肥者十枚用之今並不如法宜與古不符也惟巴豆治淨以一分得十六枚頗合千金云巴豆先去心皮畢秤之曾如法修治其薄衣務盡去之約十六枚重分九釐苟能於古方中緒論求之蛛絲馬跡非不可尋也以古方參之千金方治歷節諸風百節痠疼不可忍用松脂三十斤准今三十六兩煉五十遍少亦須二十遍服方寸匕日三百日差方寸匕容三百二十黍准今一錢此最足據者每日服三錢百日須三十兩也以松脂煉去六兩適合百日之用則古一斤為一兩二錢更無疑矣千金治結氣冷症積在脅下及腳氣上入小腹腹中脹滿大蒜去心三升搗令極熱以水三升和調絞汁更搗以水三升和絞去滓更以水三升和之共成九升滓可桃顆大棄卻三升蒜肉研汁後滓僅如挑顆大升小可知以微火煎取三升下牛乳三升合煎至三升旦起空腹一頓溫服令盡三升蒜汁可以一頓服升小可知至申時食三日服一劑三十日服十劑止蒜汁最辛劣全不慮及而頻作服之升小可知宋林億以古三兩為今一兩古三升為今一升龐安常亦云然此誤以漢之權量為憑耳於古方不相涉也古方以二龠為一升以二百四十秠黍為一兩此與劉歆所定二十龠為升二千四百秬黍為兩者大相懸絕後儒誤信班志遂以新莽刀布之重及銅斛之式斷為古律權量於是以古准今遂有三兩為一兩三升為一升之說而強合於醫方之權量耳秦漢之量每一斗為今之二升見閻百詩四書釋地及沈彤周官祿田考附識於此前明張介賓惑於鄭世子之樂書定為古方一兩今之六錢古方一升今之三合三勺者尤為大謬李時珍云古之一兩今之一錢古之一升今之二合半亦非也以古方參之肘後方治消渴以黃連三斤准今三兩六錢納豬肚中蒸服依景岳說是廿八兩八錢矣豬肚中能容之否又肘後方治中風腹痛用鹽半斤准今六錢熬水乾著口中飲熱湯二斤得吐愈依張則四兩八錢能著口中耶並能飲如許熱湯耶又肘後方治風毒腳氣用硫黃末一兩牛乳調服取汗北方人用此多效依張則六錢可作一頓服耶又肘後方治勞復用乾薑四兩為末准今三錢湯調頓服依張則為二兩四錢之乾薑可一頓服耶外臺載備急方治五屍以雄黃大蒜各一兩搗和如彈丸准今一錢三分故適如彈子大納熱酒中服之依張則一兩二錢能與彈丸相似耶千金方治吞金銀鐶用白糖二斤唐以前方用糖皆指飴糖非蔗糖也一頓准今二兩四錢漸漸食之多食亦佳依張則十九兩二錢能作一頓服耶以上辨古秤金匱方解菌毒人糞飲一升此豈今之三合三勺耶外臺載集驗方療水腫用黃牛尿一飲三升准今二合若不覺更加服之若謂是今之一升人糞牛尿誰堪多服者肘後方治齒痛醋炙枸杞白皮一升取半升含漱即瘥若如今之一合六七勺如何含而漱之又肘後方治霍亂大渴不止多飲則殺人黃粱米五升水一斗煮清三升稍稍飲之若如今之一升獨不慮其多飲而殺人耶外臺載崔知悌方治血痢石灰三升熬黃水一斗投之澄清一服一升日三服每服准今三合三勺日三服豈石灰湯可多服耶千金術膏酒治腳弱風虛用濕荊二十五束束別三尺圍各長二尺五寸徑頭二寸燒瀝三斗准今二升青竹三十束束別三尺圍各長二尺五寸徑一寸燒瀝三斗試如式取荊與竹燒之能取今一斗之瀝否千金耆婆萬病丸條下云服藥取微下三升惡水為良若三升為今一升尚云微下耶千金第七卷雜方云治崩中下血一斛服之即斷若血下至三斗三升尚堪救藥耶千金紫菀湯云小兒六十日至百日一服二合半百日至二百日一服三合若如今之八勺有奇百日以內之小兒能頓服耶以上辨古升夫以藥秤藥升農軒創造之法物晉宋以來寖失古意故梁陶貞白先生著名醫別錄論用藥分劑法則一遵神農之秤而不用子谷秬黍之制孫真人祖述其意定千金方首言今依四分為一兩稱為定亦不依隋人以三兩為一兩之法其述古藥升制度下即曰今人分藥不復用此蓋有存羊愛禮之思焉繼此有王刺史者輯外臺秘要每萬必紀其所出凡六朝諸名家所定分兩升合皆兢兢法守間有大升大兩必分別註明今良方具在顧以權量難求棄若弁髦強作解事者從而武斷之而醫宗之微旨勢不至盡墜於地不止武斷之最者莫如景岳以其所宗者悉本之偽造夏律周鬴之鄭世子也微旨者何聖人治病之樞機也升降浮沉之氣順者生逆者死但得撥之使轉即行所無事矣故藥也者求其中窽不貴多也求其循序不貴速也藥必有毒非毒無以馭病非節制無以馭毒故升秤之以小為度者誠慎之也陶隱居曰一物一毒服一丸如細麻大二物一毒服二丸如大麻三物一毒服三丸如胡豆四物一毒服四丸如小豆五物一毒服五丸如大豆六物一毒服六丸如梧子從此至十皆以梧子為度按千金論如梧子者准上論重一分以二大豆准之如大豆者重五釐以二小豆准子如小豆者重二釐半以三大麻准之如胡豆者重一釐七毫以二大麻准之如大麻者重八毫半准三細麻每一細麻重二毫八絲今人疑古方立法太峻而不詳其用意之謹密反謂古人稟厚能勝重劑則所見益顛倒矣得吾說而通之庶兒能師古之意用古之法乎千金論云古者藥在土中自養經久氣味真實今時藥力輕虛人多巧詐學者須加意重複用藥藥乃有力此亦不可不知也然觀東垣方藥味多而分量輕又宋時一切作煮散者每服皆以五錢為例可知仍不貴多也古人疑漢方湯液大劑三十餘兩小劑十餘兩用水六七升煎取二三升並分三服若以古龠量水七升煎今之三十兩未淹得過又疑散末藥只服方寸刀圭匕圓子如梧子大極至三十粒湯液豈得如此懸絕又疑風引湯一料計五十五兩每用三指撮水三升煮三沸去渣溫服一升觀其煮制每隻三指撮末應料劑如此之多今一旦考而正之三疑盡釋矣古方惟百合湯用百合七隻配水三升似與前說不相合頃友人言吾蘇陽山澄照寺前一片地上天然自產百合僅如錢大煮之清香絕勝療病極效可知百合入藥者以小為貴耳生氣通天論病因章句辯丹溪格致餘論曰生氣通天論病因四章第一章因於寒之下欲如運樞三句與上文意不相屬皆衍文也當以第二章因於暑之下體若燔炭汗出而散二句移於因寒之下云云尤在涇先生深通經義者也獨於此論未甚研求乃於讀書記云因於寒因於暑二節丹溪重定章句為是烈謂因於寒之下欲如運樞句不必謂之衍文惟起居如驚神氣乃浮二句與下文體若燔炭汗出而散二句彼此舛錯僅以此四句互為移掇讀作因於寒欲如運樞體若燔炭汗出而散因子暑汗煩則喘喝靜則多言起居如驚神氣乃浮意即貫串蓋謂因子寒者如樞運動寒氣自散如內經洗熨按摩等法是也若寒鬱為熱有似燔炭必須汗出而散如仲景麻黃湯之類是也因於暑者乃君火為病故自汗喘喝而多言以及起居卒暴神氣浮越也丹溪在涇皆相承而誤申明三年中氣候相乖化疫之說本集第二卷薛一瓢先生日講雜記中有此一則而語焉未詳書出之後諸同學迭有來問此說者爰為之詳說於左此本諸素問遺篇刺法論雖經張景岳類釋於剛柔失守之條甲丙戊庚壬五年為陽於氣剛乙丁辛已癸五年為陰於氣柔應交而不布政者謂之失守而尚未甚晰竊參鄙臆詳以明之假如甲子年上半歲多風少暖為上年司天之厥陰不退位本年司天之少陰不遷正若下半歲多涼為在泉之陽明得位甲子之在泉陽明已卯也在泉之干即以司天之干相合者推之如甲與巳合乙與庚合也在泉之支以司天之支各就四正四偏四維中陰陽相配者推之如子與卯為四正中之一陰一陽寅與巳為四偏中之一陰一陽辰與未為四維中之一陰一陽也余仿此以上年之司天臨本年之在泉則上癸下巳為不和甲失其位謂之木勝土虛甲己化土木勝必金復指下年乙庚化金之歲言金既復木必稍退而子年司天之少陰至矣木反助火剋金其復必微而甲己之土皆失守土鬱之久後化為疫早則丙寅晚則丁卯土疫至也丙辛化水之年久郁之士方得勝之而為病再次年丁壬化木木又剋土亢則害而為病也土疫即濕疫今所謂濕溫之類是也疫之微甚詳其年之司天在泉或盛或衰為定又若上半歲氣暖為少陰司天布政而下半歲多溫少涼為上年在泉之少陽不退位本年在泉之陽明不遷正夫己卯之柔不至於下本年在泉屬陽明己卯解見上則甲子之剛孤立於上亦為土虛後化為癘凡司天失守化為疫在泉失守化為癘疫瘟疫也癘殺癘也土疫將至恐傷腎臟當先補腎俞次泄土氣以去其鬱戒夜行遠行經本論刺法故以俞言用藥者亦仿其意可也其餘詳載類經不必復贅餘年皆仿此疫癘每發於陽年除天刑六年其餘二十四年是也庚子庚午君火刑金運庚寅庚申相火刑金運戊辰戊戌寒水刑火運此六年本非有餘故不發疫余皆陽剛太過故作疫也然此指陽運自勝而無邪傷者也若剛柔迭失其位四時不節謂之失之迭位即生大疫應司天而不司天應在泉而不在泉雖屬陽年亦為不及不必郁至三年始發疫癘也
