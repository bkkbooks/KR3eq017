body:
  text: 卷六唐作霖三皇藥王考自古三皇畫卦而分陰陽辨藥而作本草論病而垂內經吾醫開教於三墳至今尚讀其傳書內而醫院外而醫學並奉為主祀列入條編者也至唐而有韋氏名訊道號慈藏者施藥濟人世人共仰為藥王醫史可考則是藥王之距三皇已隔唐虞夏商周秦漢晉及南北朝十餘代矣今有無知僧道以藥王之像塑為卉服與神農之像無異藉以通書所載每年四月二十八日藥王誕之語影射混淆惑人酬款以致庸俗之人誤稱三皇為藥王殊為可笑查欽定禮科則例現載京師先醫廟奉三皇於南向配句芒等四位於東西向又分列僦貸季等二十四位於兩廡由上古而遞次及唐藥王韋慈藏現與啓元子王冰東西對列則例彰彰吾醫之有三皇猶儒者之有孔子也若夫藥王較之程朱諸子尚有間焉譬諸範歐諸儒庶兒相近今以若賢若神之號而與開物成務之大聖人相混褻慢甚矣故特考而辨之顧祖庚脈訣正訛四言脈決始自崔紫虛嗣後校者纂者頗多逮至明季李士材醫宗必讀中之所著固為盡善而亥豕之訛尚有未正彭也不才謹陳管見以俟高明鑑定脈形主病節沉弱陰虧句陰字誤刻當作陽字蓋沉弱皆陰脈有陰無陽豈非陽虧況上文有浮濡陰虛句是此句之緊對面為可徵也注中即作陰字解乃因訛承誤奇經八脈節尺外斜上至寸陰維尺內斜上至寸陽維句注中以二脈分左右恐未必然李瀕湖云陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也既為一身之綱維何得以左右分言之且言經位仍以三焦列於右尺小腸列於左寸與所著脈法心參之三焦分列三部小腸列於右尺之論自相矛盾此亦有訛五臟本脈節腎在左尺沉石而濡句字必有訛按訣中曰浮小為濡又本集脈有相似宜辨篇中曰濡與弱皆細小也濡在浮分重按即不見也弱主沉分輕取不可見也如此則濡脈不得與沉脈並見而此處又何以並稱耶考諸內經云平腎脈來喘喘纍纍如鉤因思而濡二字形似喘喘二字所以誤刻當作喘喘讀之但久訛莫正此何故耶豈因喘喘義奧庸淺校録反以喘喘為誤而改之繼而芻蕘悅口習焉而不察耶抑因濡字有耎音從來賢哲止作耎音讀之即作耎字解之而不作脈名則於脈義似乎不犯所以未之或校耶然既有濡脈而此又以非濡脈之濡字混淆不清恐不足以教天下彭反覆推敲終不若以內經喘喘二字易之非惟不與濡脈相混而與形容胃氣之義較濡耎二字更為超妙也右尺相火與心同斷句疑有衍文蓋兩尺皆腎部也內經於中附上上附上皆言左右而於尺則獨曰尺外以候腎並不言左右可見兩尺皆腎一定之位右尺既亦屬腎脈亦宜同左尺之沉石矣若與心同則上文心脈是浮大而散豈此腎部亦浮大而散乎或曰心字乃腎字之誤當作右尺相火與腎同斷其理固通但相火位居命門正中不偏不倚不過驗脈之法附於右尺其脈自宜以腎為主相火為附若讀作右尺相火與腎同斷則文法倒裝主客不明愚意不若直貫之文作右尺亦腎相火同斷讀之方見得右尺亦屬腎部其脈自必同於左尺之沉石喘喘矣不過較其大小有力無力以徵相火之衰旺故曰同斷耳三焦論贅言嘗讀難經叔和啓玄諸大賢三焦論皆謂有名無形又讀靈樞經曰密理厚皮者三焦厚粗理薄皮者三焦薄勇士者三焦理橫怯士者三焦理縱則似乎有形矣及觀李士材曰肌肉之內藏腑之外為三焦亦無形也而士材又以無形為誤而以靈樞之厚薄縱橫如霧如漚如瀆以徵其形則三焦究屬有形耶無形耶謹贅一言以辨之夫三焦者即胸膈腹內三空處也諸大賢皆謂有名無形者所以別其不同於他藏他腑之自具一形耳非曰無形即無其處正欲指空處故曰無形也靈樞謂厚薄縱橫者即借胸膈腹之腔子裡面為言非另具一形而為厚薄縱橫也經又曰如霧如漚如瀆而中焦又有作如瀝者蓋即指胸膈腹內空處之水氣為喻如果有形則霧乃氣聚有時而散漚為水泡時起時沒瀝是余滴可有可無皆無常形豈可比之上中二焦乎至於下焦如瀆者亦不過以溝瀆中水道比下焦之水道非以溝瀆之殼子相比較也即士材所謂肌肉之內藏腑之外雖有其處原無其形何反以無形為誤豈其意以既有其處即不得謂之無形耶然處與形不同有其處內經所以云云無其形諸賢所以定論先聖後賢言似異而旨實同也惟陳無擇言有形如脂膜疑未妥協蓋脂膜乃身中原有之物三焦之形如之則又一層假脂膜也假脂膜與真脂膜其何以辨哉故敢謂其未妥認疫治疫要言疫癘之證病家每每忌諱醫家故不明言然口雖不必明言心內還須認清若認之不清不但用藥無效而且開口便差認疫若何於聞見中但有兩三人病情相同者便要留心留心若何病有來蹤去迹怪怪奇奇傳變遲速不近情理較諸正傷寒風溫溫熱濕溫暑暍等門迥乎大異者即疫也脈證不必大涼而服大涼之藥似有害而終無害者即疫也脈證可進溫補而投溫補之劑始似安而漸不安者即疫也治疫之法總以毒字為提綱憑他如妖似怪自能體會無疑君如不信試觀古今治疫之方何莫非以解毒為主吳又可之專用大黃非解毒乎張路玉之酷喜人中黃而以童便配蔥豉為起手方非解毒乎葉天士之銀花金汁必同用非解毒乎至於犀角黃連生甘草等味十方九用非解毒乎故嘉言喻氏有要言不繁曰上焦如霧升而逐之佐以解毒中焦如漚疏而逐之佐以解毒下焦如瀆決而逐之佐以解毒觀其旨上中下則有升疏決之異而獨於解毒一言疊疊緊接不分彼此豈非反覆丁寧示人以真諦也哉何桂巖趨庭雜記憶余少時嘗讀內經云肺藏魄肝藏魂又云肺主氣肝主血夫既清陽之氣歸之於肺濁陰之血歸之於肝又何以清陽之魂不歸於肺金濁陰之魄不歸於肝木哉以是析疑於先子先於曰噫汝之愚也然亦不可無此一問蓋人法天地稟賦陰陽先天皇極干南坤北離東坎西是以東離日府反藏庚位之金雞西坎月宮又賴甲方之玉兔金中有木木中有金金情戀木木性戀金是大地衝和之道也肝魂肺魄更何疑哉相傳孫思邈有降龍伏虎之説余問於先子先子曰此亦當時之寓言耳蓋今之肝氣橫逆脅痛嘔惡目張痙厥非猙獰之逆龍乎而肺氣不宣喘急痰壅便溺俱無非猖狂之猛虎乎當此之際有慧心明手一劑而其病如失是即思邈之降龍伏虎也子輩讀書由此説而隅反之自可日進於高明矣竊怪今之人學術未精每咎於藥品之未醇或嫌膠之不陳或憎連之非川用桂無交趾之産用術難於邑之真諉辭卸責不知上古之世衣服宮室尚有未全金石草木之品豈如今之悉備耶然古人未嘗不治人也且醫之有藥猶繪事之有色也青黃赤黑色之常也而淡紅微翠嫩緑嬌黃乃繪家均合之巧寒熱溫涼藥之範也而大小綏急奇偶輕重亦由醫者配合之微妙耳嗟乎可以醫而不如繪者乎讀素問五運合化之理有黃氣橫於甲巳白氣橫於乙庚黑氣橫於丙辛青氣橫於丁壬赤氣橫於戊癸余潛心仇對難以自明及讀天元册文有丹天之氣經於牛女黅天之氣經於心尾蒼天之氣經於危室柳鬼素天之氣經於亢氐昂畢玄大之氣經於張翼婁胃因以張介賓所繪運氣圖玩索之始悉天干與二十八宿所處之向所合之位讀時雖少開茆塞然其合化之根源一定不移之法則尚難胸中明轍確乎無疑由是問於先子先子曰天下之事不出乎五行而河圖為五行之祖今爾以合化之所以然而欲溯流窮源盍以河圖思之也夫河圖之數一與六合二與七合三與八合四與九合五與十合試屈指天干之次第甲數居一巳數居六乙數居二庚數居七丙數居三辛數居八丁數居四壬數居九戊數居五癸數居十即河圖生成之數土為萬物之母故以為首而相生合化也此至簡至易之事而人多未有悟及者也劉九疇辨醫書音義傷寒書有噫氣不除句今人以噫字讀作依字聲者居多因四書注噫心不平聲也但此噫氣由中氣不和胃氣上逆與心不平聲義不合考字典音於介切應讀隘字之去聲為是脈訣二十八脈內有濡脈注云與爛綿相似今人讀作如字聲者居多然非濡滯之義考字典濡字有而囚如柔耎五音莊子有濡弱謙下為表句與耎字之義頗合則此濡脈宜讀耎脈為是痹者閉而不通之謂也字典兵糜切音祕今人多念作避字聲者非夏月忌枳説枳殼枳實皆破氣之品夏月乃熱傷氣之令二藥非宜故暑濕熱三氣門方中惟陽明實滿不得不與承氣湯者間有用之其餘皆不用此古人制方之意若有不謀而合焉今人未能體會每於暑熱之時任意用之是何讀古人書而漫然未覺耶或曰枳不宜於夏令檳榔尤甚矣余曰不然夏月之邪三焦受者居多非檳不達故為要藥枳不能通三焦故為時令之禁翁壽承喜傷心恐勝喜解心有所樂謂之喜何反謂其傷心哉凡人之氣以平為期不及者病過者亦病經曰心藏神神有餘則笑不休試即以不休二字味之乃樂之過而失其正也當此樂以忘憂之際有放心而不知求其心所藏之神不亦因之而渙散乎至於恐能勝喜其義維何蓋喜為心志恐為腎志水能制火既濟之道也抑更有顯而易見者人當極喜之時適有恐懼之事猝然遇之莫不反喜為憂者惟以喜之情緩於恐而恐之情急於喜也是僅以水火剋制之理言之或近傅會而不知勝復之道本乎人情實有沒相印合者恐傷腎思勝恐解恐為腎之志何即傷腎乎蓋腎者主蟄封藏之本喜靜而不喜動恐則氣下偏能動之如張子和云恐氣所致為骨酸痿厥為暴下清水為陰痿為懼而脫頤凡此諸症非皆傷腎之明驗歟若善思者處此即非常臨之自有定識豈得以恐懼搖其意見哉況思慮之志出乎脾以思勝恐亦即以土製水論情論理亦適符也思傷脾怒勝思解脾志思而肝志怒木能剋土此其理也而曰傷曰勝義亦顯明岐伯曰思則心有所存神有所歸正氣留而不行故氣結矣蓋脾處中州而屬土喜健運而惡鬱結思則氣結故曰傷也況思雖為脾志而實本乎心心者脾之母也今以多思而心營暗耗母氣既虛則所以助脾者亦寡矣若夫怒可勝思不言而喻嘗見人熟思審處之時忽有拂逆之加一朝之忿無不為已前此之思之弗得弗措者至此而無暇計及矣此無他亦惟人之常情有緩與急而已矣怒傷肝悲勝怒解肝為木臟欲散而苦急經曰肝氣虛則恐實則怒又曰怒則氣上夫以將軍之官至剛之臟復以嗔怒而助其氣是急也非散也故曰傷也若夫悲者有所哀痛而然也經曰悲則氣消則當氣逆之時適以此消氣者值之謂之曰勝誰曰不然或曰四志所勝皆與五行剋制之理合茲怒為肝志何獨非肺志之憂勝之而云悲勝怒乎蓋喜怒憂思悲恐驚其情有七而五臟止有五志故遺去悲與驚二者以悲與憂相類皆屬不遂其心也驚與恐相類皆有所怯也惟悲之情較急於憂故其勝怒為更切耳由是觀之即謂之憂勝怒亦何不可憂傷肺喜勝憂解肺為氣主忌乎膹郁經曰憂愁者氣閉塞而不行是憂能傷肺之由也至於喜可勝憂其義何居亦考諸岐伯曰喜則氣和志達營衛通利故氣緩矣則以閉塞者而和緩之豈不得謂之勝乎然亦更有顯明者凡人有所憂愁每多胸膈不舒適逢歡快之事即可情懷開曠此尤情性之常寧獨火可勝金而已哉百合病贅言此症行止坐臥皆不能安自朱奉議以為傷寒之變證後之注金匱者或言屬氣或言屬血論説紛紜余竊以為皆未中肯夫百脈一宗悉致其病乃本乎心神渙散也心主脈故心病而脈為之皆病矣惟其心神渙散故下文常默默不能食不能臥不能行數句無可奈何之態皆所以形容百脈悉病之語未經誤治病情如是者乃為此病之正故用百合而加生地黃汁顯為五志之火消爍心陰於是以此救之經所云津液相成神乃自生之意也此外因誤治之變而隨症治之如金匱所立數方亦不過略舉其概以令人隅反設未用汗吐下三法而曾或寒或熱或補或瀉之藥以誤治者治法亦宜權變惟在法古者之引伸觸類耳趙以德衍義云病多從心主或因情欲不隨或因離絶菀結或憂惶煎迫致二火鬱之所成最為切當惜其有見及此而未明言心神渙散之故注中反雜以熱毒瘀血等解殊為白璧之瑕昔張路玉治孟端士太夫人此病用生脈散加百合茯神龍齒稍兼黃連而病愈蓋以百合攝神之法而推廣之洵為能讀仲景書者矣第安神之藥不一而專取乎百合者因其形象心瓣瓣合抱取其凝合渙散之心神由是而百脈皆利矣嘗閲中吳紀聞云百合乃蚯蚓所化張路玉亦曾親見於包山土罅中有變化未全者大略野生百合蚓化有之夫蚯蚓性動而專通經絡及至變而為百合則由動而靜由散而合用為主治即此意耳且百脈悉病則病變百出非經文數症之所能盡設或症不盡合乎經文而遇病態類此者亦宜體會其意而推測之不可泥定下文數症也當明欲食不能食等句乃無可形容之辭病為神病而難以形容醫者亦須神會而非語言文字之所能罄者矣景嶽云無形者神也變幻倏忽換回非易引經文粗守形上守神二句而嘆安得有通神明而見無形者與之共談斯道哉旨哉是言也向來注者多以百合為消瘀血然消瘀血者乃赤花之山丹非百合也蘇頌以病名百合而用百合不識其義李士材曰亦清心安神之效耳士材能見及此而未發明此症之機要殊缺典也
