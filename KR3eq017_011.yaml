body:
  text: 卷十一周省吾三焦説三焦有形無形之説越人華他王冰東垣皆曰有名無形余則或言無狀或言有形紛紜無定愚意當以無形之説為是非若五藏五府各自成形可以定其象也營衛生會篇云上焦如霧中焦如漚下焦如瀆此三焦定論也以其無形故舉功用之相似者以比擬之也霧類乎氣決氣篇所謂若霧露之溉是也考漚瀆二字之義漚漬也漸也漸漬之使柔爛也則漚者狀腐熟水穀之義謂漸漬以化也瀆濁也通也所以通垢濁也則瀆者狀分別清濁即決瀆之官水道出焉之義也其三焦字義亦屬無形蓋火灼則焦火即是氣以少陽為相火即取焦字之義也上中下有分司之任故曰三也營衛生會篇云上焦出於胃上口並咽以上貫膈而布胸中中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣下焦者別回腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦又云營出於中焦衛出於下焦五味篇云谷始入於胃其精微者先出於胃之兩焦以溉五藏別出兩行營衛之道細玩經文曰出於胃上口出上焦之後曰成下焦曰胃之兩焦皆見無形體之意焉而細繹經旨即營衛之氣所從出其職司功用莫非氣之所為故中藏經曰總領五藏六府營衛經絡左右上下之氣也至本藏篇有厚薄緩急直結之説者孫東宿謂五藏五府五行正配合者也獨三焦無合故附膀胱而言非謂三焦有物如是也若論勇篇理縱理橫之説不過言其人之軀殼上下通體如此故以三字貫之而借焦字助語成辭與五味篇所云胃之兩焦句法相仿耳再以背俞篇五焦七焦之文觀之則三焦縱橫之句亦可不必拘泥矣使必以無形之説為誤豈越人華他其才智反在後人下耶命門説命門者人身之真陽腎中之元陽是已非另是一物也後世立論有謂在兩腎中間者有誤引七節之旁中有小心為命門者至謂其形如胡桃尤為荒誕夫越人倡右腎命門之説而後人非之抑思不有越人又何從有命門之説乎其意以陽氣為重人身左血右氣故歸之右也人之每藏每府各具陰陽腎為一身之根柢元陽為人身所尤重故特揭之也自古命門治法亦惟溫補腎陽而已別無他法也故虞天民兩腎總號命門之説最為近理景嶽亦有分而言之則左水右火合而言之為水火之府陰陽之宅及命門總主乎兩腎兩腎皆屬於命門之論至以子腸當之又於理未安也孫東宿以生氣立論其意頗合竟指為先天之太極亦非也近時靈胎徐氏謂腎之有兩則皆名為腎不得名為命門蓋腎為牝藏其數偶命門之義惟衝脈之根柢其位適當兩腎之中真可稱為命之門不得以右腎當之也夫以牝藏釋兩腎其説最的以衝脈當命門倡論似甚新奇細按亦非確當不過執兩腎中間之語而另開一説耳竊以為兩腎為立命之門命門穴在中間似因腎而得名越人以腎為命門又因穴而名之也總之三十六難曰命門者諸神精之所舍原氣之所繫也男子以藏精女子以系胞此真上補素靈之未及惟非皆腎知腎有一二語不免詞病以致後人辨論紛紛也陰陽常變論陰陽者一氣所分宜平宜合忌偏忌離或為對待或為流行有會處有分處本相生亦相剋天地萬物無一可以去之其理之精微實非易言者也考之醫籍或謂陰易虧而陽易亢務以益陰為先或謂陰主殺而陽主生必以扶陽為重若此之類各有至理而均非定論何也以未分常與變耳試以四時晝夜核之春夏為陽秋冬為陰兩分焉而毫弗參差夜則為陰晝則為陽總計焉而纖無多寡此陰陽之常也以大地之變論之時或亢旱即陽盛陰虛之象必有待於甘霖時或久陰即陽衰陰盛之徵是有賴於皎日此各執其説者亦有至理也以人之病論之水虧火旺非清涼無以救其燎原既不可專以陽為重氣脫神霾非溫熱無以消其陰翳亦不可獨以陰為先非偏執之見均非定論乎考之先儒語其大綱一動一靜互為其根是為流行分陰分陽兩儀立焉則為定位言其體用天以陽生萬物以陰成萬物惟兩故化合而後能遂也以陽為用則尊陰以陰為用則尊陽隨時變易迭相為用也陽不能獨立必得陰而後立故陽以陰為基陰不能自見必待陽而後見故陰以陽為唱陰陽相生也體性相須也是以陽去則陰竭陰盡則陽滅顧陰之為道利於從陽不利於抗陽陽之為性宜於潛藏不宜於發泄若夫陽主進而陰主退陽主息而陰主消進而息者其氣強退而消者其氣弱陽剛溫厚居東南主春夏而以作長為事陰柔嚴凝居西北主秋冬而以斂藏為事作長為生斂藏為殺似乎以陽為重及觀天不地不生夫不婦不成又謂元不生於元而生於貞蓋天地之化不翕聚則不能發散故不貞則無以為元而非生生不窮之道也又不必以陰為輕則先儒之説未嘗偏輕偏重也故陰陽得其正則平若權衡陰陽失其和則反如冰炭自其變者而觀之陽主乎熱陰主乎寒不可混而為一自其不變者而觀之陰氣流行即為陽陽氣凝聚即為陰豈可分而為二且陰陽互藏其宅故傷其陽即及其陰傷其陰亦即及其陽陰陽消長無窮故陽之退便是陰之生陰之退便是陽之生內經亦曰陰陽之道如環無端是也如曰陽能生陰陰則不能生陽豈理也耶且果穀草木有生於春而成於秋者亦有生於秋而成於春者惟獨陽則不生獨陰則不長耳要之論其常則毫釐不可輕重如其變則剛柔大有懸殊所以寒極則凍而死暑極則熱而斃過則主乎殺也晴明物亦榮雨露物亦茂和則主乎生也惟今人之體偏勝者多在乎臨證者於向來偏執之説毋低其短善用其長可也陰陽之理非一言可以盡之也中道説中之為道無所不涵無所不徹推之醫理尤不可忽蓋萬病由於乖戾用藥惟以調和益其不足損其有餘溫涼攻補必歸於中而後可夫中者不偏不倚無過不及之謂也故中無定體隨時而在一病有一中不可偏向一病而今日如此為中明日如彼為中慎勿固執且同一病而此則如此為中者彼則如此而又非中無窮活變故中者如權之稱物如鏡之取火少越焉太過矣少退焉不及矣總在當機之順應也醫之中道非不寒不熱不補不瀉之謂中病即是中中病而毫無偏倚毫無過不及即是至中是以補如參地瀉如硝黃熱如薑附寒如膏連散如麻桂毒如虻蛭合宜而用何一非大中之理乎是在平時窮理精而辨症明則臨病自生變化能統萬理於一原自能通一心於萬事也嘗怪前賢往哲代不乏人其聰明才辨之資縱橫反復蹈奇入險固皆醫林之傑也然而適中者寡矣書曰允孰厥中子曰中庸不可能也醫雖小道何獨不然三百九十七法考仲景傷寒書為叔和編次已失其真即林億校本亦已難得今世所傳惟成無已注釋之本而已至三百九十七法莫不津津樂道而究鮮確指汪苓友亦云前人所未明言其引張孝培傷寒類疏桂枝湯服後至以助藥力為一法溫覆至如水流漓又一法稱與諸家不同顧吾不知其何本而有此考前明有吾虞趙開美翻刻宋板傷寒論全文其三百九十七法於每篇之首注共幾法先則節録原文開明第一第二次於原文之下復列一二三之數總計全書治法瞭如也但不知出自叔和出自林億今之傳本亡之者殆為無己所刪乎後人未見宋刻茫然不曉如王安道亦未之見也國朝王晉三雖於每方之下注以各法亦不過繼張孝培汪苓友之志而愛禮存羊究有未能悉洽者故愚以為注書不應改移止宜就文辨論如朱子之賢闕文錯簡皆仍其舊無已何人而乃擅削以致迄今盈庭聚訟也僕先祖笠山公精於醫理傅極群書臨症之暇靜坐小齋手不釋卷雖至老不倦於暮年採取諸同學高論輯成吳醫匯講行世舊存見聞篇什及諸公送來佳作先祖必反復細閲再商之二三老友考訂盡善方始付梓是以採取者果多存止者亦復不少緣集行海內同人之公論系焉不苟採選可見僕先祖慎且重也選至十一卷周省吾先生佳章之後忽抱沉疴於辛酉歲辭世迄今十四載矣痛音容之已杳幸匯講之流傳慶耆僅守遺板即以十一卷第八頁省吾先生佳作為止慶耆年幼無知不能克承家學醫林典籍未經探討雖承佳章賜教不敢續入集內所以遵先祖慎採之遺意也爰書數語附於簡末嘉慶十九年歲次甲戌春正月孫男慶耆百拜謹識
